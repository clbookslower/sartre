<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CONCEPTS = [
  { id:"tempsuniv", term:"보편적 시간", latin:"temps universel", keyword:"대자에 의해 세계에 온다",
    desc:"4절의 출발 명제. \"보편적인 시간은 대자에 의해 세계에 온다\"(p.453). 즉자는 시간성을 마음대로 이용하지 못한다 — 즉자는 즉자이기 때문이고, 시간성은 끊임없이 자기를 위해 자기와 거리를 두고 존재하는 통일적 존재 방식이기 때문이다. 대자는 시간성이다. 비반성적 방식으로 대자는 존재 위에서, 다시 말해 밖에서 시간성을 발견한다. 보편적 시간성은 객관적이다.",
    example:"시계의 시간, 달력의 시간, 강물 위에 흐르는 시간 — 이 모든 객관적 시간은 사물에서 솟아나지 않는다. 대자의 시간성이 존재 위에서 발견될 때 비로소 거기 있다(p.453).", accent:"#c4a35a" },

  { id:"recognition", term:"재인의 종합", latin:"synthèse de récognition", keyword:"칸트의 시간 종합 — 사르트르가 거부한다",
    desc:"칸트가 제시한 시간 의식의 종합. \"'재인의 종합(synthèse de récognition)'이라는 말로 '지금들'의 계기적인 조직에 의해 지각된 사물에 하나의 '지속(maintenant)'을 부여하는 동일화의 점진적인 조작으로 이해한다면, 잉크병은 '재인의 종합'에 의해 결코 존재하는 것이 아니다\"(p.454). 잉크병은 단번에 시간의 3차원에 속한다.",
    example:"종이컵을 5초간 본다. 칸트라면 의식이 매 순간을 종합하여 \"같은 컵\"으로 재인한다고 말할 것이다. 사르트르는 다르다 — 컵은 지각하자마자 단번에 시간의 3차원에 속해 있다(p.453). 종합은 필요 없다.", accent:"#9a7abd" },

  { id:"refraction", term:"시간성의 굴절", latin:"réfraction de la temporalité", keyword:"내감의 선험적 형식이 아니다",
    desc:"칸트의 내감(內感, sens interne) 비판. \"이것이 시간적으로 자기를 드러내 보이는데, 그것은 이것이 내감(內感, sens interne)의 하나의 선험적 형식을 통해 굴절되기 때문이 아니라, 오히려 이것이 그 존재 자체가 시간화인 하나의 드러남에 자기를 드러내 보이기 때문이다\"(p.454).",
    example:"빛이 프리즘을 통과해 색깔로 나뉜다는 비유 — 칸트의 모델은 사물이 의식의 선험적 형식(시간)을 통과하여 시간화된다고 본다. 사르트르는 거부한다. 사물 자체의 드러남이 시간화이기 때문이다(p.454).", accent:"#c47a7a" },

  { id:"permanence", term:"항상성", latin:"permanence", keyword:"작은 무들의 활주",
    desc:"비시간적 동일성과 시간화의 탈자적 통일 사이의 타협. \"비시간적인 동일성과 시간화의 탈자적 통일 사이의 타협으로서의 항상성은, 초시간적인 불변성을 보존하고 있는 하나의 존재의 표면에 즉자적인 순간들의 단순한 활주로, 서로 분리되어 있으면서도 단순한 외면적 관계에 의해 재통합되는 작은 무들(petits néants)의 활주로 나타날 것이다\"(p.455).",
    example:"책상이 5분 후에도 같은 책상으로 남아 있다는 사실. 이 항상성은 책상 안에 있는 것도 아니고, 책상이 시간을 거치는 것도 아니다. 책상의 표면 위로 작은 무들이 활주하는 사태이다(p.455).", accent:"#6aaa82" },

  { id:"petitneants", term:"작은 무들", latin:"petits néants", keyword:"존재의 표면을 활주하는 즉자적 순간들",
    desc:"시간의 즉자적 순간들. \"초시간적인 불변성을 보존하고 있는 하나의 존재의 표면에 즉자적인 순간들의 단순한 활주로, 서로 분리되어 있으면서도 단순한 외면적 관계에 의해 재통합되는 작은 무들(petits néants)의 활주로 나타날 것이다\"(p.455). 시간의 순간들은 존재가 아니라 무다 — 그러나 항상성을 가진 존재의 표면 위에서 활주한다.",
    example:"영화의 프레임 하나하나는 그 자체로 존재가 아니지만, 그것들이 연결되어 영화가 흐른다. 사물 위로 흐르는 시간도 그렇다 — 작은 무들의 활주(p.455).", accent:"#5a9abc" },

  { id:"homogen", term:"동질성", latin:"homogénéité", keyword:"시간의 환영적 무성을 개념으로 고정한 것",
    desc:"시간의 동질적 성격에 대한 사르트르의 결정적 폭로. \"교양을 갖춘 사람은 시간의 이 절대적이고 환영적인 무성(無性, néantité)을 [시간의] 동질성(homogénéité)이라는 이름 아래 개념으로 고정할 것이다\"(p.457). 시간을 등질적·균일한 차원으로 보는 과학적·일상적 사유는 시간의 환영적 무성이 개념화된 형태일 뿐이다.",
    example:"\"시간은 균일하게 흐른다\", \"1초는 어디서나 1초다\"는 통념. 이 동질성이야말로 시간의 환영적 무성을 개념적으로 고정한 결과다(p.457). 과학적 시간관의 뿌리.", accent:"#aaba5a" },

  { id:"neantite", term:"환영적 무성", latin:"néantité", keyword:"시간의 절대적·환영적 본성",
    desc:"보편적 시간의 본성. 시간은 존재가 아니라 무성이지만, 그 무는 환영처럼 우리에게 시간이라는 통일된 형식으로 나타난다. \"공통 존재 또는 시간(Temps)으로서 필연성과 실체성으로 생각된 산포 그 자체\"(p.457). 대자(산포)와 즉자(필연성·실체성)라는 이중 근거 위에서만 나타날 수 있는 모순적 본성.",
    example:"\"시간은 흐른다\"고 우리는 말한다. 그러나 시간은 흐르는 어떤 것이 아니다. 흐름이라는 환영, 그 자체로는 무성인 것이 동질성이라는 개념적 옷을 입고 우리에게 흐르는 것처럼 보일 뿐이다(p.457).", accent:"#c4a35a" },

  { id:"abolition", term:"폐지", latin:"abolitions", keyword:"형이상학적 우연 — 존재론적 필연이 아니다",
    desc:"사물의 사라짐. \"이 현출들과 이 폐지들은 순전히 형이상학적 해명의 대상이 되어야지, 존재론적 해명의 대상이 되어서는 안 된다\"(p.458). 즉자의 존재 구조에서도, 대자의 존재 구조에서도 그것들의 필연성을 생각해 낼 수 없다. 그것들은 우연적이고 형이상학적인 사실의 존재이다.",
    example:"어제 책상 위에 있던 컵이 오늘 없다. 컵은 \"폐지\"되었다. 그러나 이 폐지는 컵의 존재론적 운명이 아니다 — 우연한 형이상학적 사실일 뿐이다(p.458).", accent:"#9a7abd" },

  { id:"apparition", term:"현출", latin:"apparitions", keyword:"단번에 존재로 — 자기의 이전과 관계 맺지 않는다",
    desc:"사물의 나타남. 폐지의 짝개념. \"현출한 것은 단번에 존재로 있으며, 있지-않음의 방식으로 있어야 하는 하나의 이전, 즉 그것이 단순한 부재로서 존재해야 하는 하나의 이전과 아무 관계도 맺지 않는다\"(p.459).",
    example:"어제까지 없던 책이 오늘 책상 위에 있다. 책은 \"현출\"했다. 그러나 이 현출은 책 자체의 자기 모험이 아니다 — 책은 단번에 존재로 있을 뿐, 자기의 이전과 관계 맺지 않는다(p.459).", accent:"#c47a7a" },

  { id:"anteriorite", term:"자기에 대한 선행성", latin:"antériorité à soi", keyword:"모험에 전제되지만 즉자에는 없다",
    desc:"모험을 가능하게 하는 구조. \"현출들은 현출하는 존재의 모험(aventures de l'être)들이 아니다. 우리는 모험에 전제되는 자기에 대한 선행성(antériorité à soi)을 대자 속에서만 발견할 수 있을 뿐이다\"(p.459). 자기에 대한 선행성이 있어야 모험이 가능하다 — 그러나 즉자에는 그것이 없다.",
    example:"한 사람의 인생이 모험인 것은 그가 자기에 앞서 자신의 미래로 있기 때문이다. 컵이 깨지는 일은 컵의 모험이 아니다 — 컵은 자기에 선행하지 않으므로(p.459).", accent:"#6aaa82" },

  { id:"causalite", term:"인과성", latin:"causalité", keyword:"외면적 연결이 아니라 탈자적 시간성의 최초 파악",
    desc:"인과성의 기원에 대한 사르트르의 재정의. 메이에르송과의 결별(p.460, 각주 107). \"최초의 인과성은, 현출된 것이 현출하기 이전에, 그것이 자신의 현출을 준비하기 위해 자신의 고유한 무 속에 이미 거기에 있는 것으로서 파악한다. 인과성은 그저 현출된 것의 시간성을 존재의 탈자적인 방식으로서 최초로 파악한다\"(p.461).",
    example:"비가 와서 땅이 젖는다. 통념: 비 → 땅 젖음의 외면적 법칙적 연결. 사르트르: 땅이 젖기 전에, \"젖을 것\"이 이미 비의 무 속에 거기 있었다. 인과성은 이 탈자적 시간성의 최초 파악이다(p.461).", accent:"#5a9abc" },

  { id:"glissement", term:"활주", latin:"glissement", keyword:"현재는 존재를 따라 일어나는 단순한 무",
    desc:"대자의 현재의 본질. \"대자의 현재는 존재에 대한 현전이다. 그리고 그런 한에서 대자의 현재는 존재하지 않는다… 현재는 존재를 따라 일어나는 단순한 활주이며, 단순한 무이다\"(p.462). 현재는 이율배반적으로 주어진다 — 체험될 때는 있지 않은 것으로 주어지고, 존재의 유일한 척도로 있는 것으로 주어진다.",
    example:"\"지금 이 순간\"이라고 말할 때, 그 \"지금\"은 어디 있는가? 잡으려 하면 사라진다. 그러나 모든 존재는 \"지금\"에서 우리에게 드러난다. 활주이자 단순한 무 — 그것이 현재의 본질이다(p.462).", accent:"#aaba5a" },

  { id:"quiddite", term:"개성원리", latin:"quidditas, quiddité", keyword:"운동에 전제되는 본질의 항상성",
    desc:"아비센나가 아리스토텔레스의 '존재에 있어서 무엇인 것'을 라틴어로 옮긴 'quidditas'를 프랑스어로 옮긴 것(p.463 각주 108). 개별 사물의 본질. \"운동에는 개성원리(quiddité)의 항상성이 전제되어 있다. 만일 하나의 이것이 한 장소에서 다른 장소로 운반되고, 또 운반되는 동안에 그 존재에서 근본적인 변질을 겪는다면, 이것은 운동을 부정하는 것이 될 것이다\"(p.463).",
    example:"빨간 당구공이 굴러간다. 굴러간 후에도 그것은 여전히 빨간 당구공이다. 이 변하지 않는 \"당구공임\"이 개성원리다. 변화는 운동이 아니다 — 운동은 개성원리의 항상성을 전제한다(p.463).", accent:"#c4a35a" },

  { id:"etrepassage", term:"지나감의-존재", latin:"être-de-passage", keyword:"한 장소에 있으면서 동시에 있지 않는 것",
    desc:"운동하는 존재의 존재 방식. 엘레아학파의 화살 아포리아를 피하려면 즉자존재 보존 공준을 포기해야 한다. \"AB를 지나가는 것은 단지 지나감의-존재(être-de-passage)이다. 지나간다는 것은 무엇인가? 바로 한 장소에 존재하면서 동시에 존재하지 않는 것이다\"(p.467).",
    example:"화살이 AB 지점을 \"지나간다.\" 화살은 그곳에 있는가, 없는가? 둘 다이다. 화살은 거기서 \"지나감의-존재\"로 있다 — 거기 있으면서 동시에 거기 있지 않다(p.467).", accent:"#9a7abd" },

  { id:"exteriorsoi", term:"자기에-대한-외면성", latin:"extériorité à soi", keyword:"운동의 본질 — 존재의 단순한 질병",
    desc:"운동의 본질에 대한 사르트르의 정의. \"운동은 자기에 외적인 하나의 존재의 존재이다\"(p.469). \"이 자기에-대한-외면성은 존재의 단순한 질병으로서, 자기로 있음과 동시에 그것들의 고유한 무로 있다고 하는, 어떤 종류의 이것들에게 있어서는 있을 수 없는 불가능성으로서 나타난다\"(p.470-471).",
    example:"당구공이 굴러간다. 굴러가는 동안 그것은 자기 자신과 어긋난다 — A에 있으면서 동시에 A에 있지 않은 채 B로 향한다. 이 자기와의 어긋남이 자기에-대한-외면성이다(p.469-471).", accent:"#c47a7a" },

  { id:"trajectoire", term:"궤적", latin:"trajectoire", keyword:"무한한 다수의 외면성으로 곧장 붕괴하는 거짓 외관",
    desc:"운동이 그리는 선. \"자기에-대한-외부성을 측정하고 또 그것을 의미하는 이 아무것도 아닌 것, 그것이 바로 하나의 궤적(trajectoire), 다시 말해 하나의 동일한 존재의 통일 속에서 외면성을 구성한다. 궤적은 그어지는 선이다. 다시 말해 궤적은 공간에서 종합적인 통일의 갑작스러운 나타남이고, 무한한 다수(multiplicité infinie)의 외면성으로 곧장 붕괴하는 하나의 거짓 외관이다\"(p.471).",
    example:"별똥별이 그리는 빛의 선. 그 선은 거기 있는가? 별이 지나간 자리에 선이 남는가? 없다. 궤적은 운동이 그리는 거짓 외관일 뿐이다 — 그어지자마자 무한한 다수로 붕괴한다(p.471).", accent:"#6aaa82" },

  { id:"moindreetre", term:"최소-존재", latin:"le moindre-être", keyword:"폐기되지도 완전히 존재하지도 못하는 어떤 것",

        <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.logic.color, letterSpacing:4, marginBottom:14 }}>핵심 차이</p>
        <p style={{ ...BD, fontSize:14, lineHeight:1.9, margin:0 }}>
          칸트는 시간을 <strong style={{color:C.txt}}>내감의 선험적 형식 + 재인의 종합</strong>으로, 엘레아학파는 운동을 <strong style={{color:C.txt}}>환상</strong>으로 봅니다. 사르트르는 둘 다 거부합니다. 그에게 시간은 사물에도 의식의 형식에도 깃들지 않으며, <strong style={{color:C.txt}}>대자에 의해 세계에 옵니다</strong>. 사물은 지속하지 않고 단지 존재하며, <strong style={{color:C.txt}}>시간이 그 위로 흐릅니다</strong>. 운동은 즉자존재 보존 공준을 깨뜨리는 <strong style={{color:C.txt}}>지나감의-존재</strong>이고, 폐기되지도 완전히 존재하지도 못하는 <strong style={{color:C.txt}}>최소-존재</strong>입니다. 보편적 시간은 벽 위를 기어가는 도마뱀의 전진과 같습니다.
        </p>
      </div>
    </div>
  );

  case 9: return (
    <div style={W}>
      <StageBadge />
      <span style={SL}>수사 · 세미나 준비</span>
      <h2 style={BT}>이제 함께 탐구합니다</h2>
      <div style={DIV} />
      <div style={{ background:"#1a0f0f", border:`1px solid ${STAGES.rhetoric.color}33`, padding:"20px 24px", marginBottom:36 }}>
        <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:10 }}>수사 단계에 대하여</p>
        <p style={{ ...BD, fontSize:14, margin:0, lineHeight:1.9 }}>
          문법으로 텍스트를 읽고, 논리로 논증을 분석했습니다. 수사는 그것을 <strong style={{color:C.txt}}>함께 말하는 단계</strong>입니다. 소크라테스식 세미나는 정답을 향해 가는 것이 아닙니다—질문이 질문을 낳고, 생각이 생각을 밀어올리는 과정입니다.
        </p>
      </div>
      <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:20 }}>세미나 토론 질문</p>
      {SEMINAR_QS.map((item,i)=>{
        const open=seminHints.has(i);
        return (
          <div key={i} style={{ marginBottom:20, background:C.surf, padding:"22px 26px", borderLeft:`3px solid ${STAGES.rhetoric.color}${i%2===0?"cc":"44"}` }}>
            <div style={{ display:"flex", gap:16, alignItems:"flex-start", marginBottom:12 }}>
              <span style={{ fontFamily:F.h, fontSize:28, color:STAGES.rhetoric.color, lineHeight:1, minWidth:34 }}>S{i+1}</span>
              <p style={{ ...BD, fontWeight:400, lineHeight:1.8, margin:0, flex:1 }}>{item.q}</p>
            </div>
            <div style={{ paddingLeft:50 }}>
              <button onClick={()=>{const n=new Set(seminHints);if(n.has(i))n.delete(i);else n.add(i);setSeminHints(n);}}
                style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:3, cursor:"pointer", padding:0 }}>
                {open?"힌트 접기 ↑":"힌트 보기 ↓"}
              </button>
              {open && (
                <div style={{ marginTop:10, padding:"12px 16px", background:C.surfUp, borderLeft:`2px solid ${STAGES.rhetoric.color}33` }}>
                  <p style={{ ...MT, fontSize:13, fontStyle:"italic", margin:0, lineHeight:1.8 }}>💡 {item.hint}</p>
                  <p style={{ fontFamily:F.b, fontSize:11, color:C.gold, letterSpacing:2, margin:"10px 0 0 0", paddingTop:8, borderTop:`1px dashed ${C.line}` }}>↳ {item.source}</p>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );

  case 10: return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", padding:"48px 28px", background:C.bg, position:"relative" }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:1, background:`linear-gradient(90deg,transparent,${C.gold}44,transparent)` }} />
      <span style={{ fontFamily:F.b, fontSize:11, letterSpacing:6, color:"#d4b46a", marginBottom:48, display:"block", fontWeight:500 }}>생각학교 ASK · 존재와 무 클래스</span>
      <div style={{ width:1, height:64, background:`linear-gradient(${C.gold}88,transparent)`, margin:"0 auto 44px" }} />
      <div style={{ background:C.surf, padding:"36px 40px", maxWidth:640, textAlign:"left", borderLeft:`3px solid ${C.gold}`, marginBottom:52 }}>
        <p style={{ fontSize:11, color:C.gold, letterSpacing:4, marginBottom:20, fontWeight:500 }}>오늘의 마지막 문장 · Jean-Paul Sartre</p>
        <p style={{ fontFamily:F.h, fontSize:"clamp(15px,2.2vw,18px)", fontStyle:"italic", color:C.txt, lineHeight:2.2, margin:0 }}>
          "이렇게 해서 이 컵과 이 책상이 나에게 드러나 보인다. <span style={{ color:C.goldBr }}>그것들은 지속하지 않는다. 그것들은 존재한다. 그리고 시간이 그것들 위로 흐른다</span>."
        </p>
        <p style={{ fontFamily:F.b, fontSize:13, color:"#c8b896", marginTop:20, marginBottom:0, letterSpacing:2, fontWeight:500 }}>— 『존재와 무』 2부 3장 4절, p.456</p>
      </div>
      <div style={{ display:"flex", gap:32, marginBottom:52, justifyContent:"center" }}>
        {[["문법","Grammar","#c4a35a"],["논리","Logic","#5a9abc"],["수사","Rhetoric","#bc7a7a"]].map(([l,e,col])=>(
          <div key={l} style={{ textAlign:"center" }}>
            <div style={{ width:5, height:5, borderRadius:"50%", background:col, margin:"0 auto 8px" }} />
            <p style={{ fontFamily:F.b, fontSize:11, color:col, letterSpacing:3, marginBottom:5 }}>{l}</p>
            <p style={{ fontFamily:F.h, fontSize:13, color:C.muted, margin:0, fontStyle:"italic" }}>{e}</p>
          </div>
        ))}
      </div>
      <button onClick={()=>go(0)} style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:4, padding:"12px 32px", cursor:"pointer" }}>처음으로</button>
    </div>
  );

  default: return null;
  }};

  const navVisible = page>0 && page<10;
  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>
      {navVisible && (
        <div style={{ position:"fixed", top:0, left:0, right:0, height:2, background:C.line, zIndex:100 }}>
          <div style={{ height:"100%", width:`${((page-1)/8)*100}%`, background:stage?stage.color:C.gold, transition:"width 0.4s ease, background 0.4s ease" }} />
        </div>
      )}
      <div style={{ opacity:fading?0:1, transition:"opacity 0.28s ease", paddingTop:navVisible?2:0 }}>
        {renderPage()}
      </div>
      {navVisible && (
        <div style={{ maxWidth:720, margin:"0 auto", padding:"0 28px 52px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <button onClick={prev} style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>← 이전</button>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            {Array.from({length:9},(_,i)=>{
              const ps=PAGE_STAGE[i+2], col=ps?STAGES[ps].color:C.gold, active=i===page-2, done=i<page-2;
              return <div key={i} style={{ width:active?8:5, height:active?8:5, borderRadius:"50%", background:done||active?col:C.line, transition:"all 0.3s" }} />;
            })}
          </div>
          {page<9 ? (
            <button onClick={next} style={{ background:"transparent", border:"none", color:stage?stage.color:C.gold, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>다음 →</button>
          ) : (
            <button onClick={next}
              onMouseEnter={e=>{e.currentTarget.style.background=STAGES.rhetoric.color;e.currentTarget.style.color=C.bg;}}
              onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=STAGES.rhetoric.color;}}
              style={{ background:"transparent", border:`1px solid ${STAGES.rhetoric.color}`, color:STAGES.rhetoric.color, fontFamily:F.b, fontSize:11, letterSpacing:3, padding:"10px 24px", cursor:"pointer", transition:"all 0.3s" }}>
              마무리
            </button>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
