<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CONCEPTS = [
  { id:"beaute", term:"미", latin:"美, beauté", keyword:"본질과 실존의 융합 — 초월적 가치",
    desc:"본질과 실존이 동일성으로 융합되는 사태를 사르트르는 가치라 부른다. 이 융합은 현재에도 장래에도 속하지 않고, 과거-현재-장래의 융합을 지시하고 실행해야 할 시간적인 총체의 종합으로서 제시된다(p.434). 이 융합이 초월인 한에서 가치이다. 그것이 바로 우리가 미(美, beauté)라고 일컫는 것이다. 따라서 미는 대자의 이상적인 실현의 상관자인 세계의 하나의 이상적인 상태를 재현한다.",
    example:"\"이 융합은 초월인 한에서 가치이다. 그것이 바로 우리가 미(美, beauté)라고 일컫는 것이다\"(p.434). 미는 사물 안에 깃든 속성이 아니라, 사물의 본질과 실존이 합치할 때의 이상적 상태에 대한 끊임없는 지시이다.", accent:"#c4a35a" },

  { id:"lebeau", term:"미적인 것", latin:"le beau", keyword:"실현될 수 없는 것으로 세계에 붙어 다닌다",
    desc:"미적인 것(le beau)은 미의 이상적 상태가 어떻게 우리에게 주어지는가에 대한 사르트르의 답이다. \"미적인 것은 실현될 수 없는 것으로 세계에 붙어 다닌다\"(p.435). 미적인 것은 사물들이 지닌 잠재성이 아니다. 인간이 세계에서 미적인 것을 실현하는 한, 그는 이것을 상상적인 방식으로 실현한다. 보통 가치로서의 미적인 것은 세계의-범위-밖의-가치로서 주제적으로 해명되지 않고, 사물들 위에서 하나의 부재로 암묵적으로 파악된다. 미적인 것은 세계의 불완전성을 통해 암묵적으로 자기를 드러내 보인다.",
    example:"한 풍경이 아름답다고 느낄 때, 그 아름다움은 풍경에 속하지 않는다. 그것은 풍경이 도달할 수 없는 어떤 이상적 상태에 대한 부재로서, 풍경을 통해 우리에게 알려진다(p.435).", accent:"#9a7abd" },

  { id:"manquant", term:"결여분", latin:"manquant", keyword:"우주는 미적인 것의 결여분으로 파악된다",
    desc:"채워져야 할 부재. 우리 자신이 우리를 하나의 결여로 파악하는 한에서, 우리는 우주를 미적인 것의 결여분(manquant)으로 파악한다(p.435). 각주 102에서 사르트르는 'manquant'이 \"결여분\"이 아니라 \"결여자\"이어야 할 것으로 보인다고 명시한다 — 즉 결여를 당한 그 무엇이 아니라 결여를 갖는 자.",
    example:"\"우리 자신이 우리를 하나의 결여로 파악하는 한에서, 우리는 우주를 미적인 것의 결여분(manquant)으로 파악한다\"(p.435). 우주 전체가 무언가를 결여한 상태로 우리에게 나타난다는 사태이다.", accent:"#c47a7a" },

  { id:"privede", term:"결여한 자", latin:"privé de", keyword:"초승달은 보름달을 \"결여한 자\"로 규정된다",
    desc:"무언가를 결여하고 있는 존재로서 규정되는 사태. \"초승달은 보름달과 관련해 결여자 또는 ……을 결여한 자(privé de)로 규정된다\"(p.437). 그러나 이와 동시에 이 초승달은 충만하게 그것이 있는 그대로의 것으로 자기를 드러내 보인다. 사물은 결여를 당하면서도 그 자체로 충만하게 있다.",
    example:"하늘의 초승달은 \"보름달을 결여한 자\"로 우리에게 나타나지만, 동시에 \"하늘에 있는 이 구체적인 기호는 그것이 있는 그대로의 것으로 존재하기 위해 아무것도 필요로 하지 않는다\"(p.437).", accent:"#6aaa82" },

  { id:"pasencore", term:"아직-아님", latin:"pas-encore", keyword:"즉자는 이 방식으로 자기 잠재성으로 있지 않다",
    desc:"잠재성이 자기 자신에게 작동하는 방식. 그러나 즉자는 이 방식으로 자기 잠재성과 관계 맺지 않는다. \"즉자는 아직-아님(pas-encore)의 방식으로 자신의 고유한 잠재성으로 있어야 하는 것은 아니다\"(p.437). 즉자의 드러내 보임은 근원적으로 무차별적 동일성의 드러내 보임이다. 즉자는 자신의 존재의 어떤 탈자적인 분산도 없이 그것이 있는 그대로 있다.",
    example:"잉크병은 \"아직 깨지지 않은\" 방식으로 존재하지 않는다. \"잉크병은 그 자체로는 깨질 수 있는 것도 아니고 깨지지 않을 수 있는 것도 아니다. 잉크병은 [그냥] 존재한다\"(p.438).", accent:"#5a9abc" },

  { id:"etreencrier", term:"잉크병으로-있음", latin:"être-encrier", keyword:"개연적인 것 — 외면적 관계로 용해되는 단순한 외현",
    desc:"잉크병이 잉크병이라는 사실 그 자체. 사르트르의 결정적 분석. \"이런 의미에서 잉크병은 존재하지만, 이 잉크병의 잉크병으로-있음(être-encrier)은 개연적인 것이다. 왜냐하면 잉크병의 '잉크병-으로-있어야-하는-것'은 즉시 외면적 관계로 용해되는 하나의 단순한 외현이기 때문이다\"(p.439). 잉크병의 본질은 잉크병이 아니고, 또 존재가 아니다. 잉크병의 본질은 정확하게 하나의 아무것도 아니다. 잉크병의 본질은 세계를 에워싸고 또 세계를 규정하는 무의 외피에 속한다.",
    example:"잉크병이 거기에 있다는 사실은 존재한다. 그러나 그것이 잉크병이라는 본질은 \"세계를 에워싸고 또 세계를 규정하는 무의 외피에 속한다\"(p.439). 본질은 무다.", accent:"#aaba5a" },

  { id:"probabilites", term:"개연성", latin:"probabilités", keyword:"잠재성이 즉자의 존재 방식으로 존재함",
    desc:"가능(possibles)과 구별되는 개념. \"이것에 의해 존재되는 것도 아니고, 이것으로 있어야 하는 것도 아니면서 이것으로 되돌아오는 이 잠재성들을 우리는 개연성들(probabilités)이라고 명명한다. 이는 이 잠재성들이 즉자의 존재 방식으로 존재한다는 것을 지적하기 위함이다\"(p.439). 나의 가능들은 결코 존재하는 것이 아니라 자기를 가능화한다. 하지만 개연적인 것들은 결코 \"개연화되지\" 않는다. 개연적인 것들은 개연적인 것들인 한에서 즉자적으로 존재한다.",
    example:"잉크병이 \"서랍에 있거나 깨진다\"는 두 개연성은 잉크병 자체에 외면적이지만, 잉크병이라는 즉자의 존재 방식으로 거기 있다(p.438-439). 잠재성은 사물의 안에 깃들지 않으면서도 사물의 일부로 존재한다.", accent:"#c4a35a" },

  { id:"taches", term:"책무", latin:"tâches", keyword:"채워져야 할 텅 빈 것들 — 세계는 책무들의 세계이다",
    desc:"\"대자에 의해 채워져야 할 텅 빈 것들\"이라는 부재의 성격. \"이 부재는 자기성의 회로의 한가운데에서 '채워져야 할 텅 빈 것들'로서 생겨나는 순수한 요구이다… 그것은 책무들(tâches)이다. 그리고 이 세계는 책무들의 세계이다\"(p.444). 책무들이 가리키는 이것은 \"이 책무들의 이것\"이며, 책무들에 의해 규정되는 유일한 즉자, 책무들을 충족할 수 있는 것으로서 책무가 가리키는 유일한 즉자이다.",
    example:"빈 컵은 \"채워져야-하는 것\"으로 나타난다(p.452). 망치는 \"두드려져야-하는 것\"으로. 우리에게 다가오는 사물들은 거의 모두 책무의 형식을 띤다 — 책무는 외면성에서 사물을 규정한다.", accent:"#5a9abc" },

  { id:"pretentions", term:"포부", latin:"prétentions", keyword:"부재를 자기 자신의 것으로 체험하는 방식",
    desc:"부재가 누군가에 의해 체험되는 직접적이고 개인적인 긴급성. \"우리가 다른 장에서 자기성이라고 명명한 것이 드러나는 것은 이 부재를 포부(prétentions)로 체험한다는 사실 자체 속에서, 그리고 그 사실 자체에 의해서이다\"(p.444). 포부는 우리가 부재를 \"내가 채워야 할 것\"으로 받아들이는 자리이다 — 자기성이 드러나는 자리.",
    example:"\"이 일은 내가 해야 할 일이다\"라고 느낄 때, 그 일은 객관적 책무이면서 동시에 나의 포부가 된다. 자기성은 포부로 체험되는 부재 안에서 드러난다(p.444).", accent:"#9a7abd" },

  { id:"ustensilite", term:"도구성", latin:"ustensilité", keyword:"사물들 사이의 근원적인 관계",
    desc:"\"이것들 사이의 양적인 관계의 토대 위에 나타나는 사물들 사이의 근원적인 관계는 도구성(ustensilité)의 관계이다. 그리고 이 도구성은 먼저 지시된 구조들 뒤에 오는 것도 아니고, 그것들에 종속되는 것도 아니다\"(p.445). 어떤 의미에서는 도구성에 다른 구조들이 전제되고, 또 다른 의미에서는 다른 구조들에 도구성이 전제된다. 즉 사물의 모든 구조는 우위 없이 단번에 주어진다.",
    example:"내가 펜을 본다는 것은 \"쓰기 위한 것\"으로 본다는 것이다. 동시에 펜은 사물이고, 공간을 차지하고, 본질을 갖고, 잠재성을 갖는다. 이 모든 구조가 분리되지 않고 한꺼번에 주어진다(p.445).", accent:"#c47a7a" },

  { id:"choseustensile", term:"사물-도구", latin:"chose-ustensile", keyword:"사물은 처음부터 사물-도구이다",
    desc:"\"또 다른 의미에서 사물은 먼저 사물로 있고, 그다음에 도구로 있는 것이 아니다. 사물은 먼저 도구로 있고, 그다음에 사물로 드러나는 것도 아니다. 사물은 사물-도구(chose-ustensile)이다\"(p.445). 사물과 도구는 순서 관계가 아니다. 사물은 처음부터 둘 다이다. 학자가 사물을 \"모든 용구성을 박탈당한 사물\"로 다룰 수는 있지만, 그것은 학자가 외면적 관계만 다루기 때문이다.",
    example:"커피잔은 사물이면서 동시에 \"마시기 위한 것\"이다. 책은 사물이면서 동시에 \"읽기 위한 것\"이다. 둘은 분리될 수 없는 하나의 사물-도구로 우리에게 나타난다(p.445).", accent:"#6aaa82" },

  { id:"etrepour", term:"……을 위한-존재", latin:"l'être-pour", keyword:"외면성에 의해 훼손되고 납작하게 된 가치 구조",
    desc:"도구의 존재 방식을 가리키는 사르트르의 핵심 표현. \"외면성에 의해 훼손되고 납작하게 된 하나의 ……을 위한-존재(l'être-pour)이다. 그 초월적 이상성은, 대자가 그것으로 있어야 하는 ……을 위한-존재의 상관자로서만 생각할 수 있을 뿐이다\"(p.445). 사물은 자신이 무차별의 안온한 행복 속에서 쉬고 있으면서도, 이와 동시에 자기 저편에 채워져야 할 책무들을 가리키고, 이 책무들로부터 자신이 있어야 할 것이 고지되는 한에서, 용구(l'instrument) 또는 도구(l'ustensile)이다.",
    example:"열쇠는 \"문을 열기 위한 것\"이지만, 그 \"위함\"은 열쇠 안에 들어 있는 것이 아니라 열쇠와 문 사이의 외면적 관계로 \"납작하게\" 되어 있다(p.445).", accent:"#aaba5a" },

  { id:"worumwillen", term:"무엇을/누구를 위함", latin:"Wozu / Worumwillen", keyword:"하이데거의 공식 수정 — 연쇄는 정지되지 않는다",
    desc:"하이데거의 도구존재 분석에서, '무엇을 위함(Wozu, pour quoi)'의 연쇄가 '누구를 위함(Worumwillen, pour qui)' — 현존재의 자기를-위함 — 에 이르러 정지된다는 명제. 사르트르는 이를 명시적으로 거부한다(p.446, 각주 104). \"'무엇을 위함'의 연쇄는 '누구를 위함(Worumwillen)'에 이르러 중지된다고 하면서 우리에게 반박해 보았자 아무 소용없을 것이다… 누구를 위함은 단지 즉자에서 벗어남을 허용하지 않을 뿐이다\"(p.446-447).",
    example:"작업복은 노동자를 위해 존재한다(누구를 위함). 하지만 그것은 노동자가 자기를 더럽히지 않고 지붕을 고치게 하기 위함이고, 월급을 옷에 쓰지 않게 하기 위함이고… 도구의 사슬은 인간에서 멈추지 않는다(p.447).", accent:"#c4a35a" },

  { id:"manqueaetre", term:"존재에-대한-결여", latin:"manque-à-l'être", keyword:"대자에 결여되어 있는 것의 근원적 양태",
    desc:"\"만일 대자에 결여되어 있는 것이 사실상 하나의 존재-저편에-있는-존재에 대한 관념적인 현전이라면, 이 존재-저편에-있는-존재는 근원적으로 존재에-대한-결여(manque-à-l'être)로서 파악된다\"(p.443). 이렇게 해서 세계는 실현해야 할 부재에 붙어 다니는 것으로 자기를 드러내 보이고, 각각의 이것은 이것을 지적하고 또 규정하는 일련의 부재들과 함께 나타난다. 이 부재들은 결국 잠재성들과 다르지 않다.",
    example:"우리는 항상 \"무엇이 있어야 한다\"고 느끼며 산다. 그 무엇이 무엇인지는 명확하지 않지만, 세계가 그것의 부재로 얼룩져 있다는 것은 분명하다. 이것이 존재에-대한-결여이다(p.443).", accent:"#9a7abd" },

  { id:"doublefuite", term:"세계로부터의 이중의 도피", latin:"double fuite du monde", keyword:"대자는 자기로부터, 그리고 세계-한복판의-존재에서 벗어남",
    desc:"\"따라서 대자는 세계로부터의 이중의 도피이다. 대자는 자신이 도피하는 하나의 세계에 대한 현전으로서 그 자신의 고유한 세계-한복판의-존재에서 벗어난다\"(p.450). [대자의] 가능은 이 도피의 자유로운 종착점이다. 대자는 자신이 그것으로 있지 않은 하나의 초월적인 것을 향해 도피할 수 없으며, 그저 자신이 그것으로 있는 하나의 초월적인 것을 향해 도피할 수 있을 뿐이다. 바로 이것이 끊임없는 도피에서의 모든 정지 가능성을 제거한다.",
    example:"우리는 두 가지를 동시에 도피한다 — 세계에 빠져 자기를 잃지 않으려고 자기를 향해, 그러나 그 자기는 또 다른 세계이므로 또 도피해야 한다. 도피의 종착점은 결코 자기 밖에 없다(p.450).", accent:"#c47a7a" },

  { id:"diaspora", term:"디아스포라", latin:"diaspora", keyword:"흩어진 것의 통일 — 시간 차원의 분산",
    desc:"\"바로 이것이 디아스포라인 것이다. 왜냐하면 디아스포라적인 존재의 통일은 하나의 주어진 단순한 귀속이 아니다. 이것은 자기의 통일 속에서 저기, 밖에서 자신을 조건지음으로써 디아스포라를 실현해야 하는 필연성이다\"(p.448). 한 시간 차원의 의미를 항상 다른 데서, 또 다른 하나의 다른 시간적 차원에서 찾아야 한다. 과거의 '있었다', 현재의 부정, 미래의 '있을 것이다'는 분산된 채로만 통일된다.",
    example:"\"지금의 나\"의 의미는 지금 안에 없다. 그것은 과거의 \"있었던 나\"에서 찾아야 하고, 미래의 \"있을 나\"에서 찾아야 한다. 시간 차원들은 흩어져 있으면서도 흩어진 채로만 통일된다(p.448).", accent:"#6aaa82" },

  { id:"soifrepletion", term:"갈증-포만", latin:"soif-réplétion", keyword:"갈증은 3차원적이다 — 가능은 포만을 지시한다",
    desc:"\"갈증은 3차원적이다. 갈증은 대자가 그것으로 있었던 하나의 비어 있는 상태로부터의 현재적인 도피이다. 그리고 주어진 상태에 비어 있음 또는 결여라는 성격을 부여하는 것도 바로 이 도피 자체이다\"(p.451). \"더 이상 결여로 있지 않을 갈증이라고 하는 결여가 그것으로 있는 가능성, 즉 갈증-포만(soif-réplétion)이다. 가능은 포만을 지시하고, 대자를 둘러싸고 여기저기에서 침투해 들어가는 환영-존재(être-fantôme)로서의 가치는 하나의 갈증을 가리킨다\"(p.452).",
    example:"\"물을 마시고 싶다\"는 욕구는 단순하지 않다. 그것은 과거의 마시지 못한 상태, 현재의 갈증, 미래의 포만 — 이 세 차원이 함께 작동하는 사태이다(p.451-452).", accent:"#5a9abc" },

  { id:"etrefantome", term:"환영-존재", latin:"être-fantôme", keyword:"가치는 환영-존재로서 대자를 둘러싸고 침투한다",
    desc:"가치의 존재 방식을 가리키는 사르트르의 표현. \"대자를 둘러싸고 여기저기에서 침투해 들어가는 환영-존재(être-fantôme)로서의 가치는 하나의 갈증을 가리킨다\"(p.452). 가치는 존재하면서도 존재하지 않는다 — 그것은 환영처럼 우리 주위를 떠돌면서 우리를 내부에서부터 규정한다. 갈증-포만, 미적인 것, 책무, 모든 가치는 환영-존재의 방식으로 존재한다.",
    example:"\"정의\", \"사랑\", \"진리\" 같은 가치는 사물처럼 거기에 있지 않다. 그것들은 우리 주위를 떠돌며 우리를 내부에서 흔드는 환영이다 — 그러나 우리를 가장 깊이 움직이는 것은 바로 이 환영들이다(p.452).", accent:"#bc7a7a" },
];

const PASSAGES = [
  { title:"논점 1 · 잠재성·미·본질은 즉자에 외면적이다 — 잉크병은 그냥 존재한다",
    note:"p.434 가치 도입 '이 가치는 그저 존재의 조건이다'부터 p.440 '과학적 인식에는 그것이 전제되어 있다'까지. '미(美)' '결여분(manquant)' '잉크병으로-있음' '개연성(probabilités)'이 키워드입니다. 미적 분석에서 출발해 사르트르가 어떻게 잠재성·본질의 외면성을 일관되게 끌고 가는지, 그리고 그 결론으로 '잉크병의 본질은 정확하게 하나의 아무것도 아니다'에 어떻게 도달하는지 따라가 보세요.",
    layers:[
      { label:"핵심 주장", text:"본질과 실존의 융합 — 그것이 가치이고, 그 가치가 미(美)이다. \"이 융합은 초월인 한에서 가치이다. 그것이 바로 우리가 미(美, beauté)라고 일컫는 것이다\"(p.434).\n\n그러나 이 미는 사물 안에 있지 않다. \"미적인 것은 실현될 수 없는 것으로 세계에 붙어 다닌다\"(p.435). 미적인 것은 사물 위에서 하나의 부재로 암묵적으로 파악되고, 세계의 불완전성을 통해 자기를 드러낸다.\n\n같은 외면성 구조가 모든 잠재성에 적용된다. \"즉자는 아직-아님(pas-encore)의 방식으로 자신의 고유한 잠재성으로 있어야 하는 것은 아니다… 즉자는 자기의 항상성이나 자기의 본질 또는 자기에게 결여되어 있는 결여분으로 있어야 하는 것이 결코 아니다\"(p.437).\n\n결정적 명제: \"잉크병은 그 자체로는 깨질 수 있는 것도 아니고 깨지지 않을 수 있는 것도 아니다. 잉크병은 [그냥] 존재한다\"(p.438). 그리고 잉크병의 본질은? \"잉크병의 본질은 정확하게 하나의 아무것도 아니다. 잉크병의 본질은 세계를 에워싸고 또 세계를 규정하는 무의 외피에 속한다\"(p.439)." },
      { label:"왜 그런가", text:"본질과 실존의 융합이 실현될 수 있다면 — 즉 사물이 자신의 본질로 충만하게 있을 수 있다면 — 우리는 미(美)를 세계에서 실현할 수 있을 것이다. 그러나 이 융합은 \"불가능하면서도 끊임없이 지시된다\"(p.434).\n\n왜 불가능한가? \"형식은 스스로 — 그리고 전적으로 — 그 자신의 고유한 질료이어야 한다. 그리고 거꾸로 질료는 절대적인 형식으로서 자기를 만들어 내야 한다\"(p.434). 추상적인 것이 구체적인 것의 근거이면서 동시에 구체적인 것이 추상적인 것의 근거이어야 한다 — 즉자-대자의 융합 — 는 모순이다.\n\n그래서 미적인 것은 상상적인 방식으로만 실현된다(p.435). 그리고 같은 외면성 구조가 모든 잠재성에 적용된다. 즉자의 드러내 보임은 무차별적 동일성의 드러내 보임이다 — 즉자는 자기 잠재성과 외면성의 관계에 있다.\n\n그러므로 \"이것이 즉자로서 자신의 잠재성과 맺는 관계는 하나의 외면성의 관계이다\"(p.437). 그리고 \"잉크병의 본질은 즉자적으로 존재하는 한에서, 그것은 실체화되고 사물화된 부정이다. 다시 말해 잉크병의 본질은 정확하게 하나의 아무것도 아니다\"(p.439)." },
      { label:"비유로", text:"초승달과 보름달. \"대자가 초승달 저편에 미래의 보름달인 하나의 존재의-저편에-있는-존재 옆에 있는 한에서, 보름달은 초승달의 잠재성이 된다\"(p.435). 그러나 초승달 자체는 무엇인가? \"하늘에 있는 이 구체적인 기호는 그것이 있는 그대로의 것으로 존재하기 위해 아무것도 필요로 하지 않는다\"(p.437). 보름달이라는 잠재성은 초승달에 외면적이다.\n\n싹과 꽃. 성냥개비. 어느 사례에서나 잠재성은 사물 자체가 아니라 우리 가능성의 초월적 상관자이다.\n\n그리고 가장 결정적인 잉크병. \"이 잉크병은 벽난로의 대리석에 던져질 수 있으며 깨질 수 있다. 하지만 이 잠재성은 잉크병과 전적으로 단절되어 있다. 왜냐하면 이 잠재성은 그것을 벽난로의 대리석을 향해 던지는 나의 가능성의 초월적 상관자일 뿐이기 때문이다\"(p.438).\n\n잉크병은 서랍에 있거나 깨진다는 등가적인 가능들을 구비하고 있다(p.439). 어느 쪽도 잉크병의 본질이 아니다 — 본질은 무다." },
    ]},
  { title:"논점 2 · 세계는 책무들의 세계 — 사물은 사물-도구이고, 그 사슬은 무한하다",
    note:"p.440 '우리는 대자존재에 대한 현전이 어떻게…'부터 p.447 '도구적 복합의 무한 지향에서 결코 벗어날 수 없음을 단적으로 의미한다'까지. '책무(tâches)' '도구성(ustensilité)' '사물-도구(chose-ustensile)' 'Wozu/Worumwillen'이 키워드입니다. 사르트르가 어떻게 사물의 모든 구조를 평등하게 두면서 동시에 도구성을 사물 간의 근원적 관계로 자리매김하는지, 그리고 하이데거의 공식을 어떻게 부분 수정하는지 따라가 보세요.",
    layers:[
      { label:"핵심 주장", text:"\"여기에는 현상의 여러 출현 방식의 배후에서 대기하고 있는 어떤 실체적인 형식도, 어떤 통일 원리도 없다. 모든 것은 그 어떤 우위도 없이 단번에 주어진다\"(p.440-441). 이것·공간성·항상성·본질·잠재성·도구성은 어떤 우위도 없이 함께 주어진다.\n\n그러나 사물 사이의 근원적 관계는 명확하다. \"이것들 사이의 양적인 관계의 토대 위에 나타나는 사물들 사이의 근원적인 관계는 도구성(ustensilité)의 관계이다\"(p.445). 그리고 \"사물은 사물-도구(chose-ustensile)이다.\"\n\n결여는 어떻게 작동하는가? \"이 부재는 자기성의 회로의 한가운데에서 '채워져야 할 텅 빈 것들'로서 생겨나는 순수한 요구이다… 그것은 책무들(tâches)이다. 그리고 이 세계는 책무들의 세계이다\"(p.444).\n\n그리고 하이데거 수정. \"여기에서 우리는 하이데거의 공식을 어느 정도 수정해야 할지를 알 수 있다\"(p.445). 하이데거는 '무엇을 위함'의 연쇄가 '누구를 위함(Worumwillen)'에서 정지된다고 보았으나, 사르트르는 거부한다 — \"누구를 위함은 단지 '무엇을 위함'의 연쇄의 하나의 고리일 뿐이다… 누구를 위함은 단지 즉자에서 벗어남을 허용하지 않을 뿐이다\"(p.446-447)." },
      { label:"왜 중요한가", text:"이 분석은 사르트르의 사물 분석을 완성한다. 사물의 모든 구조가 우위 없이 함께 주어진다는 것은, 데카르트적·후설적 관조주의(표상적인 것의 우위)에 대한 비판이기도 하다. \"같은 이유로 표상적인 것(le représentatif)이 모종의 우위를 갖는다고 생각하는 것은 잘못일 것이다\"(p.441). 세계는 관조적 직관에 먼저 주어지고 도구로 정돈되는 것이 아니다.\n\n그러나 사르트르는 하이데거의 도구존재 분석을 받아들이면서 동시에 그 결정적 지점을 수정한다. 하이데거는 도구 사슬이 인간(현존재)에서 정지된다고 보았다. 사르트르는 정지되지 않는다고 본다.\n\n그 결과: \"우리가 세계에서 출발해 타자를 고려할 때, 우리가 그것만으로는 도구적 복합의 무한 지향에서 결코 벗어날 수 없음을 단적으로 의미한다\"(p.447). 인간실재 자체가 다른 도구 사슬의 한 고리일 뿐이다.\n\n이것은 인간학적 함의가 무겁다. 우리는 도구 사슬에 갇혀 있고, 그 사슬은 어디에도 정지되지 않는다. \"이 '삶-노동'의 총체가 갖는 의미에 대한 물음, 즉 '살고 있는 나, 나는 왜 일하는가? 사는 것이 일하기 위한 것이라면 왜 사는가?'라는 물음은 반성적 차원에서만 제기할 수 있을 뿐이다\"(p.448)." },
      { label:"비유로", text:"작업복. 사르트르가 직접 펼쳐 보이는 도구 사슬이다(p.447).\n\n\"확실히 작업복은 노동자를 위해 존재한다. 하지만 그것은 노동자가 자기를 더럽히지 않고 지붕을 고칠 수 있게 하기 위한 것이다. 그렇다면 그는 왜 자기를 더럽히면 안 되는가? 자신의 월급의 많은 부분을 옷을 구입하는 데 쓰지 않기 위해서이다. 그것은 실제로 그의 월급이 생계를 유지할 수 있는 최소한의 금액이기 때문이다. 자신이 자신의 생계를 유지하는 데 필요한 최소한의 돈만 월급으로 받기 때문이다. 그리고 그가 '생계를 유지하는' 것은 정확하게 자기의 노동력을 지붕을 수리하는 데 사용할 수 있기 위해서이다. 그렇다면 그는 왜 지붕을 수리해야 하는가? 직원들이 회계 일 등을 하는 사무실에 비가 새지 않도록 하기 위해서이다 등.\"\n\n사슬은 어디에서도 끝나지 않는다. 노동자(인간)도 또 다른 도구 사슬의 한 고리일 뿐이다." },
    ]},
  { title:"논점 3 · 우리는 우리 자신을 향해 달린다 — 가능은 당나귀의 당근이다",

const STAGES = {

        시작하기

      <div style={{ display:"flex", gap:24, marginTop:40, justifyContent:"center" }}>

      {[

        { key:"logic", n:"02", label:"논리 — Dialectica", pages:"2섹션", desc:"사르트르의 논증 구조를 단계별로 분해합니다. 관조주의·하이데거와의 대결을 통해 논증의 결정적 지점을 찾아봅니다.", items:["논증 구조 5단계 시각화","관조주의 vs 하이데거 vs 사르트르 비교 분석"] },

          {CONCEPTS.map((c,i)=><div key={i} style={{ width:6, height:6, borderRadius:"50%", background:flipped.has(c.id)?C.gold:C.line, transition:"background 0.3s" }} />)}

      </div>

  );

        <div style={DIV} />
        <div style={{ background:"#111a10", border:`1px solid #2a4a2a`, padding:"18px 22px", marginBottom:28 }}>
          <p style={{ fontSize:11, color:"#4a8a4a", letterSpacing:3, marginBottom:8 }}>책에서 찾아보기</p>
          <p style={{ ...BD, fontSize:13, margin:0, color:"#8abb8a", lineHeight:1.85 }}>{p.note}</p>
        </div>
        <p style={{ ...MT, fontSize:12, marginBottom:16, letterSpacing:1 }}>아래 탭을 순서대로 눌러 이해의 층을 쌓아보세요</p>

          {p.layers.map((l,i)=>(
            <button key={i} onClick={()=>setPLayers(prev=>{const n=[...prev];n[pIdx]=i;return n;})}
              style={{ flex:1, padding:"12px 8px", background:layer===i?C.surfUp:C.surf, border:"none", borderBottom:`2px solid ${layer===i?C.gold:C.line}`, color:layer===i?C.gold:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:2, cursor:"pointer", transition:"all 0.2s" }}>

        {pIdx<2 && (

            <button onClick={next} style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:3, padding:"10px 28px", cursor:"pointer" }}>

  }

  case 6: return (
    <div style={W}>
      <StageBadge />
      <span style={SL}>문법 5/5 · 이해 확인</span>
      <h2 style={BT}>이해 확인 퀴즈</h2>
      <div style={DIV} />
      <p style={{ ...MT, marginBottom:40, fontSize:14 }}>정답을 선택하고 '확인'을 누르면 해설이 나옵니다.</p>
      {QUIZ.map((q,qi)=>(
        <div key={qi} style={{ marginBottom:40 }}>
          <div style={{ display:"flex", gap:14, marginBottom:16, alignItems:"flex-start" }}>
            <span style={{ fontFamily:F.h, fontSize:26, color:C.gold, lineHeight:1, minWidth:32 }}>Q{qi+1}</span>
            <p style={{ ...BD, fontWeight:400, lineHeight:1.75, margin:0 }}>{q.q}</p>
          </div>
          {q.opts.map((opt,oi)=>{
            const sel=qSel[qi]===oi, done=qDone[qi], correct=oi===q.ans;
            let bg=C.surf, border=C.line, color=C.txt;
            if(done){ if(correct){bg="#192819";border="#3a7a3a";color="#8acd8a";}else if(sel){bg="#281919";border="#7a3a3a";color="#cd8a8a";}else{color=C.muted;} }
            else if(sel){ bg=C.surfUp; border=C.gold+"88"; }
            return (
              <div key={oi} onClick={()=>{if(!done){const n=[...qSel];n[qi]=oi;setQSel(n);}}}
                style={{ background:bg, border:`1px solid ${border}`, padding:"13px 18px", marginBottom:8, cursor:done?"default":"pointer", display:"flex", gap:14, alignItems:"flex-start", transition:"all 0.2s" }}>
                <span style={{ fontFamily:F.h, fontSize:16, color:done&&correct?"#3a7a3a":(done&&sel?"#7a3a3a":C.muted), minWidth:20, lineHeight:1.6 }}>{String.fromCharCode(65+oi)}</span>
                <span style={{ ...BD, fontSize:14, color, margin:0, lineHeight:1.7 }}>{opt}</span>
                {done&&correct&&<span style={{ marginLeft:"auto", color:"#3a7a3a", fontSize:16, flexShrink:0 }}>✓</span>}
              </div>
            );
          })}
          {!qDone[qi]&&qSel[qi]!==null&&(
            <button onClick={()=>{const n=[...qDone];n[qi]=true;setQDone(n);}}
              style={{ marginTop:8, padding:"10px 28px", background:"transparent", border:`1px solid ${C.gold}`, color:C.gold, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer" }}>
              확인
            </button>
          )}
          {qDone[qi]&&(
            <div style={{ background:"#101910", border:`1px solid #1e3a1e`, padding:"16px 20px", marginTop:12 }}>
              <p style={{ fontSize:11, color:"#4a8a4a", letterSpacing:3, marginBottom:8 }}>해설</p>
              <p style={{ ...BD, fontSize:13, color:"#90bb90", margin:0, lineHeight:1.85 }}>{q.exp}</p>
            </div>
          )}
        </div>
      ))}
      <div style={{ textAlign:"center", padding:"16px 0", borderTop:`1px solid ${C.line}` }}>
        <span style={{ ...MT, fontSize:12, letterSpacing:2 }}>{qDone.filter(Boolean).length} / {QUIZ.length} 완료</span>
      </div>
    </div>
  );

  case 7: return (
    <div style={W}>
      <StageBadge />
      <span style={SL}>논리 1/2 · 논증 구조</span>
      <h2 style={BT}>사르트르의 논증을 분해한다</h2>
      <div style={DIV} />
      <p style={{ ...MT, marginBottom:36, fontSize:14, lineHeight:1.9 }}>'다음 단계' 버튼을 눌러 사르트르의 논증을 단계적으로 따라가보세요.</p>
      {ARG_STEPS.slice(0,argStep+1).map((step,i)=>(
        <div key={i} style={{ marginBottom:14, opacity:i===argStep?1:0.55, transition:"opacity 0.3s" }}>
          <div style={{ display:"flex", alignItems:"stretch" }}>
            <div style={{ width:4, background:step.color, flexShrink:0 }} />
            <div style={{ background:i===argStep?C.surfUp:C.surf, padding:"20px 24px", flex:1 }}>
              <div style={{ display:"flex", gap:12, alignItems:"center", marginBottom:10 }}>
                <span style={{ fontFamily:F.b, fontSize:10, letterSpacing:4, color:step.color }}>{step.num}</span>
                <span style={{ fontFamily:F.h, fontSize:18, color:i===argStep?C.txt:C.muted }}>{step.title}</span>
              </div>
              <p style={{ ...BD, fontSize:14, lineHeight:1.9, marginBottom:12, whiteSpace:"pre-line" }}>{step.body}</p>
              <div style={{ padding:"10px 14px", background:C.bg, borderLeft:`2px solid ${step.color}44` }}>
                <p style={{ ...MT, fontSize:12, margin:0, color:step.color }}>✦ {step.key}</p>
              </div>
            </div>
          </div>
        </div>
      ))}
      <div style={{ display:"flex", gap:14, marginTop:24, alignItems:"center" }}>
        {argStep<ARG_STEPS.length-1 ? (
          <button onClick={()=>setArgStep(s=>s+1)}
            onMouseEnter={e=>{e.currentTarget.style.background=ARG_STEPS[argStep+1].color;e.currentTarget.style.color=C.bg;}}
            onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=ARG_STEPS[argStep+1].color;}}
            style={{ padding:"12px 28px", background:"transparent", border:`1px solid ${ARG_STEPS[argStep+1].color}`, color:ARG_STEPS[argStep+1].color, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", transition:"all 0.3s" }}>
            다음 단계 →
          </button>
        ) : (
          <span style={{ ...MT, fontSize:12, letterSpacing:2 }}>논증 완료</span>
        )}
        {argStep>0 && (
          <button onClick={()=>setArgStep(0)} style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:2, cursor:"pointer" }}>처음부터</button>
        )}
        <span style={{ marginLeft:"auto", ...MT, fontSize:11 }}>{argStep+1} / {ARG_STEPS.length}</span>
      </div>
    </div>
  );

  case 8: return (
    <div style={W}>
      <StageBadge />
      <span style={SL}>논리 2/2 · 철학사적 대결</span>
      <h2 style={BT}>관조주의·하이데거와의 대결</h2>
      <div style={DIV} />
      <p style={{ ...MT, marginBottom:24, fontSize:14 }}>세 입장을 눌러 비교해보세요. 사르트르가 어디서 갈라지는지 확인하세요.</p>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:36 }}>
        {POSITIONS.map((pos,i)=>{
          const open=posOpen===i;
          return (
            <div key={i} onClick={()=>setPosOpen(open?null:i)}
              style={{ background:open?C.surfUp:C.surf, border:`1px solid ${open?pos.color+"88":C.line}`, padding:"16px 14px", cursor:"pointer", transition:"all 0.25s" }}>
              <p style={{ fontFamily:F.h, fontSize:17, color:open?pos.color:C.muted, margin:"0 0 4px", textAlign:"center" }}>{pos.label}</p>
              <p style={{ fontSize:10, color:C.muted, fontStyle:"italic", margin:0, textAlign:"center", letterSpacing:1 }}>{pos.sub}</p>
              {open && (
                <div style={{ marginTop:14 }}>
                  <div style={{ marginBottom:10, paddingBottom:10, borderBottom:`1px solid ${C.line}` }}>
                    <p style={{ fontSize:10, color:pos.color, letterSpacing:3, marginBottom:6 }}>주장</p>
                    <p style={{ ...BD, fontSize:12, margin:0, lineHeight:1.75 }}>{pos.claim}</p>
                  </div>
                  <div style={{ marginBottom:10 }}>
                    <p style={{ fontSize:10, color:i===2?"#5a8a5a":"#8a4a4a", letterSpacing:3, marginBottom:6 }}>{i===2?"귀결":"한계"}</p>
                    <p style={{ ...BD, fontSize:12, margin:0, lineHeight:1.75, color:i===2?"#8abb8a":"#c48a8a" }}>{pos.problem}</p>
                  </div>
                  <div style={{ padding:"8px 12px", background:C.surf, borderLeft:`2px solid ${pos.color}44` }}>
                    <p style={{ fontSize:11, color:pos.color, margin:0, fontStyle:"italic" }}>"{pos.quote}"</p>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{ background:C.surf, padding:"20px 24px" }}>
        <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.logic.color, letterSpacing:4, marginBottom:14 }}>핵심 차이</p>
        <p style={{ ...BD, fontSize:14, lineHeight:1.9, margin:0 }}>
          관조주의는 세계를 <strong style={{color:C.txt}}>관조적 직관에 먼저 주어지는 것</strong>으로, 하이데거는 도구 사슬이 <strong style={{color:C.txt}}>현존재(Worumwillen)에서 정지</strong>되는 것으로 봅니다. 사르트르는 둘 다 거부합니다. 그에게 사물의 모든 구조는 우위 없이 단번에 주어지고, 사물은 <strong style={{color:C.txt}}>사물-도구</strong>이며, 도구 사슬은 <strong style={{color:C.txt}}>인간에서도 정지되지 않습니다</strong>. 그 귀결은 무겁습니다 — 인간은 디아스포라적 존재이고, 자기 자신을 향해 달리지만 결코 자신을 따라잡을 수 없습니다. 가능은 당나귀의 당근입니다.
        </p>
      </div>
    </div>
  );

  case 9: return (
    <div style={W}>
      <StageBadge />
      <span style={SL}>수사 · 세미나 준비</span>
      <h2 style={BT}>이제 함께 탐구합니다</h2>
      <div style={DIV} />
      <div style={{ background:"#1a0f0f", border:`1px solid ${STAGES.rhetoric.color}33`, padding:"20px 24px", marginBottom:36 }}>
        <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:10 }}>수사 단계에 대하여</p>
        <p style={{ ...BD, fontSize:14, margin:0, lineHeight:1.9 }}>
          문법으로 텍스트를 읽고, 논리로 논증을 분석했습니다. 수사는 그것을 <strong style={{color:C.txt}}>함께 말하는 단계</strong>입니다. 소크라테스식 세미나는 정답을 향해 가는 것이 아닙니다—질문이 질문을 낳고, 생각이 생각을 밀어올리는 과정입니다.
        </p>
      </div>
      <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:20 }}>세미나 토론 질문</p>
      {SEMINAR_QS.map((item,i)=>{
        const open=seminHints.has(i);
        return (
          <div key={i} style={{ marginBottom:20, background:C.surf, padding:"22px 26px", borderLeft:`3px solid ${STAGES.rhetoric.color}${i%2===0?"cc":"44"}` }}>
            <div style={{ display:"flex", gap:16, alignItems:"flex-start", marginBottom:12 }}>
              <span style={{ fontFamily:F.h, fontSize:28, color:STAGES.rhetoric.color, lineHeight:1, minWidth:34 }}>S{i+1}</span>
              <p style={{ ...BD, fontWeight:400, lineHeight:1.8, margin:0, flex:1 }}>{item.q}</p>
            </div>
            <div style={{ paddingLeft:50 }}>
              <button onClick={()=>{const n=new Set(seminHints);if(n.has(i))n.delete(i);else n.add(i);setSeminHints(n);}}
                style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:3, cursor:"pointer", padding:0 }}>
                {open?"힌트 접기 ↑":"힌트 보기 ↓"}
              </button>
              {open && (
                <div style={{ marginTop:10, padding:"12px 16px", background:C.surfUp, borderLeft:`2px solid ${STAGES.rhetoric.color}33` }}>
                  <p style={{ ...MT, fontSize:13, fontStyle:"italic", margin:0, lineHeight:1.8 }}>💡 {item.hint}</p>
                  <p style={{ fontFamily:F.b, fontSize:11, color:C.gold, letterSpacing:2, margin:"10px 0 0 0", paddingTop:8, borderTop:`1px dashed ${C.line}` }}>↳ {item.source}</p>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );

  case 10: return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", padding:"48px 28px", background:C.bg, position:"relative" }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:1, background:`linear-gradient(90deg,transparent,${C.gold}44,transparent)` }} />
      <span style={{ fontFamily:F.b, fontSize:11, letterSpacing:6, color:"#d4b46a", marginBottom:48, display:"block", fontWeight:500 }}>생각학교 ASK · 존재와 무 클래스</span>
      <div style={{ width:1, height:64, background:`linear-gradient(${C.gold}88,transparent)`, margin:"0 auto 44px" }} />
      <div style={{ background:C.surf, padding:"36px 40px", maxWidth:640, textAlign:"left", borderLeft:`3px solid ${C.gold}`, marginBottom:52 }}>
        <p style={{ fontSize:11, color:C.gold, letterSpacing:4, marginBottom:20, fontWeight:500 }}>오늘의 마지막 문장 · Jean-Paul Sartre</p>
        <p style={{ fontFamily:F.h, fontSize:"clamp(15px,2.2vw,18px)", fontStyle:"italic", color:C.txt, lineHeight:2.2, margin:0 }}>
          "이렇듯 우리는 하나의 가능을 뒤쫓아 달리는데, 우리의 달음질은 그 가능 자체가 나타나도록 하지만, 그 가능은 우리의 달음질 외의 다른 아무것도 아니며, 또 그 자체도 우리의 도달 범위 밖에 있다. <span style={{ color:C.goldBr }}>우리는 우리 자신을 향해 달리고, 이로 인해 우리는 자신을 따라잡을 수 없는 존재이다</span>."
        </p>
        <p style={{ fontFamily:F.b, fontSize:13, color:"#c8b896", marginTop:20, marginBottom:0, letterSpacing:2, fontWeight:500 }}>— 『존재와 무』 2부 3장 3절, p.450</p>
      </div>
      <div style={{ display:"flex", gap:32, marginBottom:52, justifyContent:"center" }}>
        {[["문법","Grammar","#c4a35a"],["논리","Logic","#5a9abc"],["수사","Rhetoric","#bc7a7a"]].map(([l,e,col])=>(
          <div key={l} style={{ textAlign:"center" }}>
            <div style={{ width:5, height:5, borderRadius:"50%", background:col, margin:"0 auto 8px" }} />
            <p style={{ fontFamily:F.b, fontSize:11, color:col, letterSpacing:3, marginBottom:5 }}>{l}</p>
            <p style={{ fontFamily:F.h, fontSize:13, color:C.muted, margin:0, fontStyle:"italic" }}>{e}</p>
          </div>
        ))}
      </div>
      <button onClick={()=>go(0)} style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:4, padding:"12px 32px", cursor:"pointer" }}>처음으로</button>
    </div>
  );

  default: return null;
  }};

  const navVisible = page>0 && page<10;
  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>
      {navVisible && (
        <div style={{ position:"fixed", top:0, left:0, right:0, height:2, background:C.line, zIndex:100 }}>
          <div style={{ height:"100%", width:`${((page-1)/8)*100}%`, background:stage?stage.color:C.gold, transition:"width 0.4s ease, background 0.4s ease" }} />
        </div>
      )}
      <div style={{ opacity:fading?0:1, transition:"opacity 0.28s ease", paddingTop:navVisible?2:0 }}>
        {renderPage()}
      </div>
      {navVisible && (
        <div style={{ maxWidth:720, margin:"0 auto", padding:"0 28px 52px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <button onClick={prev} style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>← 이전</button>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            {Array.from({length:9},(_,i)=>{
              const ps=PAGE_STAGE[i+2], col=ps?STAGES[ps].color:C.gold, active=i===page-2, done=i<page-2;
              return <div key={i} style={{ width:active?8:5, height:active?8:5, borderRadius:"50%", background:done||active?col:C.line, transition:"all 0.3s" }} />;
            })}
          </div>
          {page<9 ? (
            <button onClick={next} style={{ background:"transparent", border:"none", color:stage?stage.color:C.gold, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>다음 →</button>
          ) : (
            <button onClick={next}
              onMouseEnter={e=>{e.currentTarget.style.background=STAGES.rhetoric.color;e.currentTarget.style.color=C.bg;}}
              onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=STAGES.rhetoric.color;}}
              style={{ background:"transparent", border:`1px solid ${STAGES.rhetoric.color}`, color:STAGES.rhetoric.color, fontFamily:F.b, fontSize:11, letterSpacing:3, padding:"10px 24px", cursor:"pointer", transition:"all 0.3s" }}>
              마무리
            </button>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
