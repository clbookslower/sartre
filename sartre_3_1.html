<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CONCEPTS = [
  { id:"qualite", term:"성질", latin:"qualité", keyword:"'거기에 있다(il y a)'의 한계 내에서 자기를 드러내는 존재 전부",
    desc:"성질(qualité)은, 이것이 세계 또는 다른 이것들과 맺는 모든 외적 관계의 밖에서 고려할 때의 이것의 존재 외에 아무것도 아니다(p.417). 성질은 결코 존재의 외부가 아니다. 성질은 전적으로 존재이다(p.418). 오히려 성질은 '거기에 있다(il y a)'가 지닌 한계 내에서 자기를 드러내 보이는 그 존재 전부이다.",
    example:"레몬의 노란색은 우리가 레몬을 파악할 때의 주관적인 하나의 방법이 아니다. 그 노란색은 레몬이다. 노란 것은 레몬의 신맛이고, 신 것은 레몬의 노란색이다—성질들은 서로를 통해 남김없이 퍼져 있다(p.417).", accent:"#6aaa82" },

  { id:"etrequalite", term:"성질-존재", latin:"être-qualité", keyword:"심리적 주관성과 혼동되어선 안 되는 위상",
    desc:"성질이 존재의 한 양상으로서 가지는 위상. 사람들은 성질을 너무 자주 하나의 단순한 주관적인 규정이라고 생각했고, 그때 성질-존재(être-qualité)는 심리적인 것의 주관성과 혼동되었다(p.417). 사르트르가 거부하는 잘못된 출발점이다. 성질을 성질-존재라고 부르는 것은 성질에 실체와 유사한 신비한 버팀목을 마련해 주는 것이 아니라, 성질의 존재 방식이 '대자'의 존재 방식과 근본적으로 다르다는 점을 지적하기 위함이다(p.420).",
    example:"사람들은 흔히 \"내가 레몬을 노랗게 본다\"고 표현한다. 이때 노란색은 마치 내 안에 있는 인상처럼 들린다. 사르트르는 이 통념을 거부한다—노란색은 내 머릿속이 아니라 레몬 자체로서 존재한다.", accent:"#9a7abd" },

  { id:"alimentaire", term:"식품 직관", latin:"intuition alimentaire", keyword:"성질들이 서로를 통해 한꺼번에 주어지는 직관",
    desc:"사르트르가 p.417-418에서 직접 사용하는 표현. 성질이 서로를 통해 단번에 통합적으로 주어지는 직관 방식. 잼 병에 손가락을 넣으면 잼의 끈적거리는 차가움은 내 손가락에 대한 그 단맛의 열어 보임이다. 한 수영장의 물의 유동성, 미지근함, 푸르스름한 색깔, 파동성 등은 서로를 통해 단번에 주어진다. 그리고 이것이라 불리는 것은 바로 이 전적인 상호 침투이다. 이것이 화가들, 특히 세잔이 경험을 통해 잘 보여 주고 있다.",
    example:"잼 병에 손가락을 넣으면 그 끈적거리는 차가움은 곧 단맛의 열어 보임이다. 차가움/끈적임/단맛이 분리되어 차례로 주어지지 않고, 하나의 사건으로 단번에 주어진다(p.418).", accent:"#c4a35a" },

  { id:"etreodeur", term:"향기-존재 / 빛-존재", latin:"être-odeur / être-lumière", keyword:"성질은 주관적 인상이 아니라 존재로 우리에게 옴",
    desc:"내가 눈을 감고서 갑자기 들이마신 향기는, 심지어 내가 그것을 향기를 풍기는 하나의 대상과 연관 짓기도 전에, 이미 하나의 향기-존재(un être-odeur)이지, 하나의 주관적인 인상이 아니다. 아침에 감겨 있던 나의 눈꺼풀을 통해 나의 눈을 자극하는 빛은 이미 하나의 빛-존재(un être-lumière)이다(p.420). 성질의 실재론적 위상을 보여주는 사르트르의 결정적 사례.",
    example:"잠에서 깨기 직전, 눈꺼풀 너머로 들어오는 빛—그것은 내가 '아침이다'라고 의식하기 전에 이미 하나의 '빛-존재'다. 의식이 그것을 빛으로 해석하기 이전에 그것은 이미 거기에 존재로서 있다.", accent:"#5a9abc" },

  { id:"erfullung", term:"충족", latin:"remplissement, Erfüllung", keyword:"사르트르가 거부하는 후설의 인식 모델",
    desc:"후설 현상학의 핵심 개념. 의향(noesis)이 직관에 의해 채워지는 사태—인식이 그 대상을 완전히 채워 갖는 모델. 사르트르는 p.419에서 거부한다: \"성질의 파악은, 후설이 원한 바와 같이 '충족(remplissement, Erfüllung)'이 아니라, 이 성질에 대한 한정된 텅 빔으로서의 하나의 텅 빔에 대한 알림이다.\" 인식은 결코 완전한 채움이 될 수 없으며, 항상 갈증을 동반한다. 성질은 끊임없이 손이 미치지 않는 곳에서 현전한다.",
    example:"빨강을 본다는 것은 후설에게는 의식이 빨강에 의해 충족되는 사건이다. 사르트르에게는 다르다—나는 빨강을 '갖는' 게 아니라, 빨강이 거기에 있고 나는 그것이 아님을, 내가 그것에 결여되어 있음을 통보받을 뿐이다.", accent:"#aaba5a" },

  { id:"tantalos", term:"탄탈로스의 갈증", latin:"Tantalos", keyword:"인식은 갈증이며, 성질은 손이 닿지 않는 곳에서 현전한다",
    desc:"사르트르가 p.419에서 인식론 전체에 던지는 비유. \"인식에 대한 설명은 너무 자주 음식을 섭취하는 식으로 이루어졌다. 인식론적 철학에는 아직도 전 논리적 사유가 너무 많이 남아 있다. 이 착각에 따르면, 인식한다는 것은 먹는 것이다.\" 사르트르는 이를 시원적 착각이라고 부른다. 진실은 정반대다—\"마치 손이 닿을 수 없는 곳의 음식을 보고 탄탈로스의 허기가 더 심해지는 것처럼, 성질을 관조하는 것은 우리의 존재에 대한 갈증을 더욱더 증대시킬 뿐이다.\"",
    example:"신화의 탄탈로스는 손을 내밀면 과일이 공중으로 솟구쳐 영원히 굶주린다(각주 95). 우리가 빨강을 본다는 것은 빨강을 '먹는' 것이 아니라, 우리 자신이 빨강이 아님을—우리가 빨강에 결여되어 있음을—통보받는 일이다.", accent:"#c47a7a" },

  { id:"profil", term:"음영", latin:"profil", keyword:"한 관점에서 일그러진 채로 드러나는, 그러나 전체를 담고 있는 부분",
    desc:"컵을 바라볼 때 반드시 어느 한 방향에서 볼 수밖에 없고, 컵은 일그러진 모양으로 나타난다—이 일그러진 모양이 음영이다(각주 96). 사르트르의 결정적 입장: 우리는 컵의 '부분적인' 한 음영을 보고서 컵 전체를 지각한다(각주 97). 후설의 노에시스-노에마 모델에 대한 사르트르의 실재론적 응답. 후설은 부분적 음영의 연속을 인식적 질료(Hyle)로 보고, 의식작용(Noesis)이 가해져 전체가 노에마(Noema)로 나타난다고 본다. 사르트르는 종합 과정 없이, 음영에 컵 전체가 직관적으로 반영되어 한꺼번에 지각된다고 본다.",
    example:"옆에서 본 컵은 타원형이지만 우리는 그것을 '원형 컵'으로 본다. 후설은 의식이 여러 음영을 종합해 컵을 구성한다고 한다. 사르트르는 다르다—이 일그러진 모양 자체에 이미 컵 전체가 들어 있다.", accent:"#6aaa82" },

  { id:"qualitececi", term:"성질-이것", latin:"qualité-ceci", keyword:"추상되었으나 존재적 밀도를 잃지 않은 성질",
    desc:"추상은 \"공중에 떠 있는\" 하나의 성질을 파악하는 것이 아니다. 거기에서는 내적 배경의 무차별화가 절대적인 균형을 향하는 하나의 성질-이것(une qualité-ceci)을 파악하기 때문이다(p.422). 각주 99: '이것인 컵의 이 하얀색'을 지시해 말할 때 그 하얀색을 따로 '이것'이라 말할 수 있다. 결정적인 점: 추상적인 초록은 그 존재적인 밀도(densité)를 상실하지 않는다. 만일 상실한다면 이 추상적인 초록은 대자의 하나의 주관적인 양식에 불과할 것이다(p.422). 사르트르 추상론이 관념론과 갈라지는 지점.",
    example:"화가가 \"이 사과의 빨강\"이라고 말할 때, 그 '빨강'은 사과에서 떨어진 추상이 아니다. 그 빨강은 여전히 존재로서 거기에 있고, 다만 우리가 그것을 따로 '이것'으로 부를 뿐이다.", accent:"#9a7abd" },

  { id:"abstraction", term:"추상", latin:"abstraction / l'abstrait", keyword:"대자의 근원적 존재 방식—사물의 나타남에 필수적인 세계의 구조",
    desc:"사르트르의 추상은 심리적 조작이 아니다. \"대자는 '추상을 하는 자(abstracteur)'이다. 이것은 대자가 추상작용의 심리적 조작을 실현하기 때문이 아니라, 대자가 하나의 장래, 다시 말해 하나의 존재 저편과 함께 존재에 대한 현전으로 나타나기 때문이다\"(p.424). \"추상적인 것은 구체적인 것의 나타남에 필수적인 세계의 하나의 구조이다\"(p.433). 추상은 미래로부터 온다—구체적인 이것이 \"거칠고-빛나는-초록\"으로 나에게 드러날 때, 추상적 초록은 그 이것의 와야-할-의미다(p.423).",
    example:"우리는 사물에서 '빨강'을 떼어내 추상하는 것이 아니다. 반대로, '빨강'이라는 미래의 의미가 사물에 미리 가 있어야만 우리는 이 사과를 '빨간 사과'로 볼 수 있다. 추상이 먼저고, 사물의 나타남이 그 다음이다.", accent:"#c4a35a" },

  { id:"negext", term:"외적 부정", latin:"négation externe", keyword:"이것-저것 사이의 근원적 관계, 즉자적으로 존재하는 부정",
    desc:"이것과 저것의 근원적인 관계는 하나의 외적 부정이다(p.425). 저것은 이것이 아닌 것으로서 나타난다. 이 외적 부정은 대자에게 하나의 초월적인 것으로 자기를 드러내 보인다. 이 외적 부정은 바깥에 존재하며, 즉자적으로 존재한다. \"이것은 저것이 아니다\"는 \"이것과 저것\"으로 표기된다. 외적 부정은 즉자존재와 순수한 이상성이라는 이중적 성격을 드러낸다(p.426). 양과 공간의 토대.",
    example:"이 책상과 저 의자 사이의 '아님'—그 부정 관계 자체는 책상에도, 의자에도, 내 머릿속에도 있지 않다. 그러나 그것은 분명히 거기에 있고, 즉자적으로 존재한다.", accent:"#5a9abc" },

  { id:"quantite", term:"양", latin:"quantité", keyword:"관념적이고 즉자적인 무—순수한 외면성",
    desc:"존재의 무차별은 그저 이것들을 분리하는 하나의 즉자적인 무이다. 그리고 이 무는 의식이 존재를 특징짓는 동일성의 응집을 실현할 수 있는 유일한 방식이다. 이 관념적이고 즉자적인 무가 바로 양(quantité)이다(p.427). 사실상 양은 순수한 외면성이다. 양은 부가되는 항들에 결코 의존하지 않으며, 그 항들의 독립성의 긍정일 뿐이다. 헤아린다는 것(compter)은 이미 분해할 수 있는 것으로 주어져 있는 하나의 총체 내부에서의 관념적인 식별을 수행하는 것이다.",
    example:"내 앞에서 얘기를 하고 있는 이 세 사람을 내가 헤아릴 때, '세 사람'이라는 것은 그룹의 속성도 아니고 구성원의 속성도 아니다. 그들 중 누구에게도 \"당신은 세 사람이다\"라고 말할 수 없으며 \"당신이 세 번째다\"라고도 말할 수 없다—세 번째라는 성질은 헤아리는 대자의 자유의 반영일 뿐이다(p.428).", accent:"#aaba5a" },

  { id:"negcomp", term:"보완적 부정", latin:"négation complémentaire", keyword:"사물 차원의 부정—내가 신체로서 그 이것이 아니라는 것",
    desc:"각주 101에서 사르트르는 세 가지 부정을 구별한다. **최초의 부정**: 대자로서 내가 지각되는 '이것'이 아니다. **보완적 부정**: 신체를 가진 사물로서의 내가 그 '이것'이 아니다—마치 '이것(이 책상)'이 '저것(저 선풍기)'이 아닌 것과 같은 차원에서. **가능적 부정**: 보완적 부정이 작동할 가능성으로서, 최초의 부정에서 벗어날 수 있는 길. \"나는 하나의 보완적인 부정을 향해 이 부정을 피한다. 이 보완적인 부정과 최초의 부정의 융합은 내가 그것으로 있는 즉자를 나타나게 해야 할 것이다\"(p.430).",
    example:"내가 이 컵을 볼 때 (1) 대자로서 나는 컵이 아니다(최초의 부정), (2) 내 신체도 컵이 아니다—책상이 선풍기가 아닌 것처럼(보완적 부정), (3) 이 두 부정이 합쳐지면 나는 즉자가 될 수도 있을 가능성을 갖는다(가능적 부정).", accent:"#c47a7a" },

  { id:"negpres", term:"부정-현전", latin:"négation-présence", keyword:"대자의 보충적 부정의 존재 구조",
    desc:"대자가 자신의 고유한 가능성으로서 그것으로 있는 이 보충적인 부정은 부정-현전(négation-présence)이다(p.430). 대자는 자기(에 대한) 비정립적 의식으로서, 또 존재-저편의-존재에 대한 정립적 의식으로서 보충적 부정으로 있어야 한다. 그리고 존재-저편의-존재는 어떤 외면적인 관계에 의해서가 아니라, 대자와 그 장래의 관계와 더불어 상관관계에 있는 보완성이라는 하나의 정확한 결합에 의해 현전적인 이것과 연결되어 있다.",

          </div>

      </div>

  }

  case 6: return (
    <div style={W}>
      <StageBadge />

                  </div>
                  <div style={{ padding:"8px 12px", background:C.surf, borderLeft:`2px solid ${pos.color}44` }}>
                    <p style={{ fontSize:11, color:pos.color, margin:0, fontStyle:"italic" }}>"{pos.quote}"</p>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{ background:C.surf, padding:"20px 24px" }}>
        <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.logic.color, letterSpacing:4, marginBottom:14 }}>핵심 차이</p>
        <p style={{ ...BD, fontSize:14, lineHeight:1.9, margin:0 }}>
          후설은 인식을 <strong style={{color:C.txt}}>채움(Erfüllung)</strong>으로, 인식론 전통은 인식을 <strong style={{color:C.txt}}>먹기·동화</strong>로 모델링합니다. 사르트르는 둘 다 같은 시원적 착각의 변종으로 봅니다. 그에게 인식은 <strong style={{color:C.txt}}>한정된 텅 빔에 대한 알림</strong>이며 갈증의 증대입니다. 양과 공간은 사물에 깃들지 않고 대자가 가져오는 무이며, 본질은 미래로부터 거꾸로 흘러옵니다. 그 대가는 무겁습니다—세계의 모든 구조가 대자의 부정과 자유에 뿌리박혀 있다는 결론입니다.
        </p>
      </div>
    </div>
  );

  case 9: return (
    <div style={W}>
      <StageBadge />
      <span style={SL}>수사 · 세미나 준비</span>
      <h2 style={BT}>이제 함께 탐구합니다</h2>
      <div style={DIV} />
      <div style={{ background:"#1a0f0f", border:`1px solid ${STAGES.rhetoric.color}33`, padding:"20px 24px", marginBottom:36 }}>
        <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:10 }}>수사 단계에 대하여</p>
        <p style={{ ...BD, fontSize:14, margin:0, lineHeight:1.9 }}>
          문법으로 텍스트를 읽고, 논리로 논증을 분석했습니다. 수사는 그것을 <strong style={{color:C.txt}}>함께 말하는 단계</strong>입니다. 소크라테스식 세미나는 정답을 향해 가는 것이 아닙니다—질문이 질문을 낳고, 생각이 생각을 밀어올리는 과정입니다.
        </p>
      </div>
      <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:20 }}>세미나 토론 질문</p>
      {SEMINAR_QS.map((item,i)=>{
        const open=seminHints.has(i);
        return (
          <div key={i} style={{ marginBottom:20, background:C.surf, padding:"22px 26px", borderLeft:`3px solid ${STAGES.rhetoric.color}${i%2===0?"cc":"44"}` }}>
            <div style={{ display:"flex", gap:16, alignItems:"flex-start", marginBottom:12 }}>
              <span style={{ fontFamily:F.h, fontSize:28, color:STAGES.rhetoric.color, lineHeight:1, minWidth:34 }}>S{i+1}</span>
              <p style={{ ...BD, fontWeight:400, lineHeight:1.8, margin:0, flex:1 }}>{item.q}</p>
            </div>
            <div style={{ paddingLeft:50 }}>
              <button onClick={()=>{const n=new Set(seminHints);if(n.has(i))n.delete(i);else n.add(i);setSeminHints(n);}}
                style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:3, cursor:"pointer", padding:0 }}>
                {open?"힌트 접기 ↑":"힌트 보기 ↓"}
              </button>
              {open && (
                <div style={{ marginTop:10, padding:"12px 16px", background:C.surfUp, borderLeft:`2px solid ${STAGES.rhetoric.color}33` }}>
                  <p style={{ ...MT, fontSize:13, fontStyle:"italic", margin:0, lineHeight:1.8 }}>💡 {item.hint}</p>
                  <p style={{ fontFamily:F.b, fontSize:11, color:C.gold, letterSpacing:2, margin:"10px 0 0 0", paddingTop:8, borderTop:`1px dashed ${C.line}` }}>↳ {item.source}</p>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );

  case 10: return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", padding:"48px 28px", background:C.bg, position:"relative" }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:1, background:`linear-gradient(90deg,transparent,${C.gold}44,transparent)` }} />
      <span style={{ fontFamily:F.b, fontSize:11, letterSpacing:6, color:"#d4b46a", marginBottom:48, display:"block", fontWeight:500 }}>생각학교 ASK · 존재와 무 클래스</span>
      <div style={{ width:1, height:64, background:`linear-gradient(${C.gold}88,transparent)`, margin:"0 auto 44px" }} />
      <div style={{ background:C.surf, padding:"36px 40px", maxWidth:640, textAlign:"left", borderLeft:`3px solid ${C.gold}`, marginBottom:52 }}>
        <p style={{ fontSize:11, color:C.gold, letterSpacing:4, marginBottom:20, fontWeight:500 }}>오늘의 마지막 문장 · Jean-Paul Sartre</p>
        <p style={{ fontFamily:F.h, fontSize:"clamp(15px,2.2vw,18px)", fontStyle:"italic", color:C.txt, lineHeight:2.2, margin:0 }}>
          "이렇듯 순수한 초록은 장래의 배경으로부터 <span style={{ color:C.goldBr }}>'밝음-거침-초록'</span>에로 그것의 의미로서 온다."
        </p>
        <p style={{ fontFamily:F.b, fontSize:13, color:"#c8b896", marginTop:20, marginBottom:0, letterSpacing:2, fontWeight:500 }}>— 『존재와 무』 2부 3장 3절, p.432</p>
      </div>
      <div style={{ display:"flex", gap:32, marginBottom:52, justifyContent:"center" }}>
        {[["문법","Grammar","#c4a35a"],["논리","Logic","#5a9abc"],["수사","Rhetoric","#bc7a7a"]].map(([l,e,col])=>(
          <div key={l} style={{ textAlign:"center" }}>
            <div style={{ width:5, height:5, borderRadius:"50%", background:col, margin:"0 auto 8px" }} />
            <p style={{ fontFamily:F.b, fontSize:11, color:col, letterSpacing:3, marginBottom:5 }}>{l}</p>
            <p style={{ fontFamily:F.h, fontSize:13, color:C.muted, margin:0, fontStyle:"italic" }}>{e}</p>
          </div>
        ))}
      </div>
      <button onClick={()=>go(0)} style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:4, padding:"12px 32px", cursor:"pointer" }}>처음으로</button>
    </div>
  );

  default: return null;
  }};

  const navVisible = page>0 && page<10;
  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>
      {navVisible && (
        <div style={{ position:"fixed", top:0, left:0, right:0, height:2, background:C.line, zIndex:100 }}>
          <div style={{ height:"100%", width:`${((page-1)/8)*100}%`, background:stage?stage.color:C.gold, transition:"width 0.4s ease, background 0.4s ease" }} />
        </div>
      )}
      <div style={{ opacity:fading?0:1, transition:"opacity 0.28s ease", paddingTop:navVisible?2:0 }}>
        {renderPage()}
      </div>
      {navVisible && (
        <div style={{ maxWidth:720, margin:"0 auto", padding:"0 28px 52px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <button onClick={prev} style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>← 이전</button>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            {Array.from({length:9},(_,i)=>{
              const ps=PAGE_STAGE[i+2], col=ps?STAGES[ps].color:C.gold, active=i===page-2, done=i<page-2;
              return <div key={i} style={{ width:active?8:5, height:active?8:5, borderRadius:"50%", background:done||active?col:C.line, transition:"all 0.3s" }} />;
            })}
          </div>
          {page<9 ? (
            <button onClick={next} style={{ background:"transparent", border:"none", color:stage?stage.color:C.gold, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>다음 →</button>
          ) : (
            <button onClick={next}
              onMouseEnter={e=>{e.currentTarget.style.background=STAGES.rhetoric.color;e.currentTarget.style.color=C.bg;}}
              onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=STAGES.rhetoric.color;}}
              style={{ background:"transparent", border:`1px solid ${STAGES.rhetoric.color}`, color:STAGES.rhetoric.color, fontFamily:F.b, fontSize:11, letterSpacing:3, padding:"10px 24px", cursor:"pointer", transition:"all 0.3s" }}>
              마무리
            </button>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
