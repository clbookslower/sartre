  { q: "대자는 항상 자기 자신과 '일치하지 못한다.' 이것이 인간의 불안, 자유, 창조와 어떻게 연결될까요?",
    hint: "돌멩이는 불안하지 않다. 왜인가?" },
  { q: "인식이 '내적 부정'이라면, 나는 항상 내가 아닌 것들을 통해 나를 정의합니다. 이것이 정체성, 편견, 타자에 대한 태도와 어떤 관계인가요?",
    hint: "우리가 어떤 집단을 부정함으로써 우리 자신을 정의할 때 어떤 일이 일어나는가?" },
  { q: "관념론(마음이 세계를 만든다)과 실재론(세계가 마음에 작용한다)—사르트르의 비판 이후에도 여러분은 어느 쪽이 더 설득력 있다고 느끼나요?",
    hint: "눈을 감아도 벽은 거기 있는가?" },
  { q: "하이데거는 실천(도구 사용)이 인식보다 더 원초적이라 봅니다. 사르트르는 인식이 먼저라고 합니다. 여러분의 일상에서는 어느 쪽이 먼저인 것 같나요?",
    hint: "우리는 먼저 보고 생각하는가, 먼저 손에 쥐고 사용하는가?" },
];

const STAGES = {
  grammar: { label: "문법", latin: "Grammatica", sub: "텍스트가 무엇을 말하는가", color: "#c4a35a", bg: "#1a160a" },
  logic:   { label: "논리", latin: "Dialectica",  sub: "논증이 어떻게 작동하는가", color: "#5a9abc", bg: "#0a121a" },
  rhetoric:{ label: "수사", latin: "Rhetorica",   sub: "함께 탐구하고 설득하는가", color: "#bc7a7a", bg: "#1a0f0f" },
};
const PAGE_STAGE = {2:"grammar",3:"grammar",4:"grammar",5:"grammar",6:"grammar",7:"logic",8:"logic",9:"rhetoric"};

function App() {
  const [page, setPage] = useState(0);
  const [fading, setFading] = useState(false);
  const [flipped, setFlipped] = useState(new Set());
  const [pLayers, setPLayers] = useState([0,0,0]);
  const [qSel, setQSel] = useState([null,null,null,null]);
  const [qDone, setQDone] = useState([false,false,false,false]);
  const [argStep, setArgStep] = useState(0);
  const [posOpen, setPosOpen] = useState(null);
  const [logicOpen, setLogicOpen] = useState(new Set());
  const [seminHints, setSeminHints] = useState(new Set());

  const TOTAL = 11;
  const go = (n) => { setFading(true); setTimeout(() => { setPage(n); setFading(false); window.scrollTo(0,0); }, 280); };
  const next = () => { if (page < TOTAL-1) go(page+1); };
  const prev = () => { if (page > 0) go(page-1); };

  const C = { bg:"#0d0b09", surf:"#18140e", surfUp:"#221d15", txt:"#e8e2d5", muted:"#7a7060", gold:"#c4a35a", goldBr:"#deb96a", line:"#2a2418" };
  const F = { h:"'Cormorant Garamond', Georgia, serif", b:"'Noto Serif KR', Georgia, serif" };
  const W = { maxWidth:720, margin:"0 auto", padding:"52px 28px", color:C.txt, fontFamily:F.b };
  const SL = { fontFamily:F.b, fontSize:11, letterSpacing:4, color:C.gold, marginBottom:18, display:"block" };
  const BT = { fontFamily:F.h, fontSize:32, fontWeight:400, color:C.txt, lineHeight:1.25, marginBottom:8 };
  const DIV = { width:36, height:1, background:C.gold, marginBottom:28 };
  const BD = { fontSize:15, lineHeight:1.95, color:C.txt, fontWeight:300, fontFamily:F.b };
  const MT = { fontSize:15, lineHeight:1.95, color:C.muted, fontWeight:300, fontFamily:F.b };

  const stageKey = PAGE_STAGE[page];
  const stage = stageKey ? STAGES[stageKey] : null;

  const StageBadge = () => {
    if (!stage) return null;
    return (
      <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:28, padding:"10px 16px", background:stage.bg, border:`1px solid ${stage.color}33`, width:"fit-content" }}>
        <div style={{ width:6, height:6, borderRadius:"50%", background:stage.color }} />
        <span style={{ fontFamily:F.b, fontSize:11, letterSpacing:4, color:stage.color }}>{stage.label}</span>
        <span style={{ fontFamily:F.h, fontSize:13, color:C.muted, fontStyle:"italic" }}>{stage.latin}</span>
        <span style={{ fontFamily:F.b, fontSize:11, color:C.muted }}>· {stage.sub}</span>
      </div>
    );
  };

  const renderPage = () => {
    switch(page) {

    case 0:
      return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", padding:"48px 28px", background:C.bg, position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg, transparent, ${C.gold}, transparent)` }} />
          <div style={{ position:"absolute", bottom:0, left:0, right:0, height:1, background:`linear-gradient(90deg, transparent, ${C.gold}44, transparent)` }} />
          <div style={{ position:"absolute", inset:0, backgroundImage:`radial-gradient(ellipse at 50% 55%, #1a160e 0%, transparent 65%)`, pointerEvents:"none" }} />
          <span style={{ fontFamily:F.b, fontSize:11, letterSpacing:6, color:C.muted, marginBottom:48, display:"block" }}>생각학교 ASK</span>
          <h1 style={{ fontFamily:F.h, fontSize:"clamp(40px,8vw,60px)", fontWeight:300, color:C.txt, lineHeight:1.1, marginBottom:10 }}>존재와 무</h1>
          <p style={{ fontFamily:F.h, fontSize:20, color:C.muted, fontStyle:"italic", marginBottom:6 }}>L'Être et le Néant</p>
          <p style={{ fontFamily:F.b, fontSize:12, color:C.muted, letterSpacing:2 }}>Jean-Paul Sartre, 1943</p>
          <div style={{ width:1, height:52, background:`linear-gradient(${C.gold}88, transparent)`, margin:"36px auto" }} />
          <p style={{ fontFamily:F.b, fontSize:13, letterSpacing:5, color:C.gold, marginBottom:10 }}>소크라테스식 고전 탐구 세미나</p>
          <p style={{ fontFamily:F.h, fontSize:17, color:C.muted, fontStyle:"italic", marginBottom:16 }}>2부 3장 1절 · 대자와 즉자 사이의</p>
          <p style={{ fontFamily:F.h, fontSize:17, color:C.muted, fontStyle:"italic", marginBottom:52 }}>전형적 관계로서의 인식</p>
          <button onClick={next}
            onMouseEnter={e=>{e.currentTarget.style.background=C.gold;e.currentTarget.style.color=C.bg;}}
            onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=C.gold;}}
            style={{ background:"transparent", border:`1px solid ${C.gold}`, color:C.gold, fontFamily:F.b, fontSize:12, letterSpacing:4, padding:"15px 48px", cursor:"pointer", transition:"all 0.3s" }}>
            시작하기
          </button>
          <div style={{ display:"flex", gap:24, marginTop:40, justifyContent:"center" }}>
            {[["문법","#c4a35a"],["논리","#5a9abc"],["수사","#bc7a7a"]].map(([l,col]) => (
              <div key={l} style={{ textAlign:"center" }}>
                <div style={{ width:5, height:5, borderRadius:"50%", background:col, margin:"0 auto 6px" }} />
                <span style={{ fontFamily:F.b, fontSize:10, color:col, letterSpacing:3 }}>{l}</span>
              </div>
            ))}
          </div>
        </div>
      );

    case 1:
      return (
        <div style={W}>
          <span style={SL}>안내 · 트리비움으로 읽다</span>
          <h2 style={BT}>세 단계로 고전을 읽는 법</h2>
          <div style={DIV} />
          <p style={{ ...BD, marginBottom:32 }}>
            이 세미나는 생각을 이끄는 도구, <strong style={{color:C.goldBr}}>트리비움</strong>으로 텍스트를 읽습니다—<strong style={{color:C.goldBr}}>문법, 논리, 수사</strong>. 각 단계는 텍스트를 다른 깊이로 만나는 방법입니다.
          </p>
          {[
            { key:"grammar", n:"01", label:"문법 — Grammatica", pages:"5섹션",
              desc:"텍스트가 무엇을 말하는지 파악합니다. 사르트르가 사용하는 언어와 개념을 내 것으로 만드는 단계입니다.",
              items:["즉자·대자·무·인식·현전·내적 부정 개념 카드 (6종)","핵심 논점 3개 단계별 독해","이해 확인 퀴즈 4문항"] },
            { key:"logic", n:"02", label:"논리 — Dialectica", pages:"2섹션",
              desc:"사르트르의 논증 구조를 단계별로 분해합니다. 관념론·실재론 비판의 논리를 파악하고, 이 논증의 강점과 약점을 스스로 찾아봅니다.",
              items:["논증 구조 5단계 시각화","관념론 vs 사르트르 vs 실재론 비교","비판적 탐구 질문 4개"] },
            { key:"rhetoric", n:"03", label:"수사 — Rhetorica", pages:"세미나에서 함께",
              desc:"이 단계는 세미나 현장에서 함께 합니다. 가이드에서는 토론 질문을 미리 확인합니다.",
              items:["소크라테스식 세미나 토론 질문 5개","힌트와 함께 입장 준비"] },
          ].map((item) => {
            const s = STAGES[item.key];
            return (
              <div key={item.key} style={{ marginBottom:20, background:C.surf, padding:"22px 24px", borderLeft:`3px solid ${s.color}` }}>
                <div style={{ display:"flex", gap:14, alignItems:"flex-start", marginBottom:14 }}>
                  <span style={{ fontFamily:F.h, fontSize:30, color:s.color, lineHeight:1, minWidth:32 }}>{item.n}</span>
                  <div>
                    <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:6 }}>
                      <span style={{ fontFamily:F.b, fontSize:11, letterSpacing:4, color:s.color }}>{item.label}</span>
                      <span style={{ fontFamily:F.b, fontSize:11, color:C.muted }}>· {item.pages}</span>
                    </div>
                    <p style={{ ...BD, fontSize:13, margin:0, lineHeight:1.8 }}>{item.desc}</p>
                  </div>
                </div>
                <div style={{ paddingLeft:46 }}>
                  {item.items.map((it,j) => (
                    <div key={j} style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"4px 0" }}>
                      <div style={{ width:4, height:4, borderRadius:"50%", background:s.color+"88", flexShrink:0, marginTop:7 }} />
                      <span style={{ ...MT, fontSize:13 }}>{it}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      );

    case 2:
      return (
        <div style={W}>
          <StageBadge />
          <span style={SL}>문법 1/5 · 핵심 개념</span>
          <h2 style={BT}>카드를 눌러 개념을 확인하세요</h2>
          <div style={DIV} />
          <p style={{ ...MT, marginBottom:36, fontSize:14 }}>6개 모두 열어보시길 권합니다. 지금 완전히 이해하지 않아도 됩니다—이후 독해와 퀴즈를 통해 다시 만납니다.</p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            {CONCEPTS.map((c) => {
              const open = flipped.has(c.id);
              return (
                <div key={c.id}
                  onClick={()=>{const n=new Set(flipped);if(n.has(c.id))n.delete(c.id);else n.add(c.id);setFlipped(n);}}
                  style={{ background:open?C.surfUp:C.surf, border:`1px solid ${open?c.accent+"66":C.line}`, padding:"18px 20px", cursor:"pointer", transition:"all 0.25s" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div>
                      <p style={{ fontFamily:F.h, fontSize:19, color:open?c.accent:C.goldBr, fontWeight:500, margin:"0 0 2px" }}>{c.term}</p>
                      <p style={{ fontSize:11, color:C.muted, fontStyle:"italic", margin:0, letterSpacing:1 }}>{c.latin}</p>
                    </div>
                    <span style={{ color:open?C.gold:C.muted, fontSize:20, lineHeight:1, display:"block", transform:open?"rotate(45deg)":"none", transition:"transform 0.25s" }}>+</span>
                  </div>
                  {open && (
                    <div style={{ marginTop:16 }}>
                      <p style={{ fontSize:11, color:c.accent, letterSpacing:3, marginBottom:10, fontWeight:500 }}>{c.keyword}</p>
                      <p style={{ ...BD, fontSize:13, marginBottom:14, lineHeight:1.85 }}>{c.desc}</p>
                      <div style={{ background:C.surf, padding:"12px 14px" }}>
                        <p style={{ ...MT, fontSize:12, margin:0, lineHeight:1.8 }}>✦ {c.example}</p>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{ textAlign:"center", marginTop:28 }}>
            <span style={{ ...MT, fontSize:12, letterSpacing:2 }}>{flipped.size} / {CONCEPTS.length} 확인</span>
            <div style={{ display:"flex", justifyContent:"center", gap:6, marginTop:10 }}>
              {CONCEPTS.map((c,i)=><div key={i} style={{ width:6, height:6, borderRadius:"50%", background:flipped.has(c.id)?C.gold:C.line, transition:"background 0.3s" }} />)}
            </div>
          </div>
        </div>
      );

    case 3: case 4: case 5: {
      const pIdx = page-3;
      const p = PASSAGES[pIdx];
      const layer = pLayers[pIdx];
      return (
        <div style={W}>
          <StageBadge />
          <span style={SL}>문법 {pIdx+2}/5 · 핵심 논점 {pIdx+1}/3</span>
          <h2 style={BT}>{p.title}</h2>
          <div style={DIV} />
          <div style={{ background:"#111a10", border:`1px solid #2a4a2a`, padding:"18px 22px", marginBottom:28 }}>
            <p style={{ fontSize:11, color:"#4a8a4a", letterSpacing:3, marginBottom:8 }}>책에서 찾아보기</p>
            <p style={{ ...BD, fontSize:13, margin:0, color:"#8abb8a", lineHeight:1.85 }}>{p.note}</p>
          </div>
          <p style={{ ...MT, fontSize:12, marginBottom:16, letterSpacing:1 }}>아래 탭을 순서대로 눌러 이해의 층을 쌓아보세요</p>
          <div style={{ display:"flex" }}>
            {p.layers.map((l,i)=>(
              <button key={i} onClick={()=>setPLayers(prev=>{const n=[...prev];n[pIdx]=i;return n;})}
                style={{ flex:1, padding:"12px 8px", background:layer===i?C.surfUp:C.surf, border:"none", borderBottom:`2px solid ${layer===i?C.gold:C.line}`, color:layer===i?C.gold:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:2, cursor:"pointer", transition:"all 0.2s" }}>
                {l.label}
              </button>
            ))}
          </div>
          <div style={{ background:C.surfUp, padding:"28px 26px", minHeight:148, borderTop:`1px solid ${C.line}`, marginBottom:32 }}>
            <p style={{ ...BD, margin:0, lineHeight:2.1, whiteSpace:"pre-line" }}>{p.layers[layer].text}</p>
          </div>
          {pIdx < 2 && (
            <div style={{ display:"flex", justifyContent:"center" }}>
              <button onClick={next} style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:3, padding:"10px 28px", cursor:"pointer" }}>
                다음 논점으로 →
              </button>
            </div>
          )}
        </div>
      );
    }

    case 6:
      return (
        <div style={W}>
          <StageBadge />
          <span style={SL}>문법 5/5 · 이해 확인</span>
          <h2 style={BT}>이해 확인 퀴즈</h2>
          <div style={DIV} />
          <p style={{ ...MT, marginBottom:40, fontSize:14 }}>정답을 선택하고 '확인'을 누르면 해설이 나옵니다.</p>
          {QUIZ.map((q,qi)=>(
            <div key={qi} style={{ marginBottom:40 }}>
              <div style={{ display:"flex", gap:14, marginBottom:16, alignItems:"flex-start" }}>
                <span style={{ fontFamily:F.h, fontSize:26, color:C.gold, lineHeight:1, minWidth:32 }}>Q{qi+1}</span>
                <p style={{ ...BD, fontWeight:400, lineHeight:1.75, margin:0 }}>{q.q}</p>
              </div>
              {q.opts.map((opt,oi)=>{
                const sel=qSel[qi]===oi,done=qDone[qi],correct=oi===q.ans;
                let bg=C.surf,border=C.line,color=C.txt;
                if(done){if(correct){bg="#192819";border="#3a7a3a";color="#8acd8a";}else if(sel){bg="#281919";border="#7a3a3a";color="#cd8a8a";}else{color=C.muted;}}
                else if(sel){bg=C.surfUp;border=C.gold+"88";}
                return (
                  <div key={oi} onClick={()=>{if(!done){const n=[...qSel];n[qi]=oi;setQSel(n);}}}
                    style={{ background:bg, border:`1px solid ${border}`, padding:"13px 18px", marginBottom:8, cursor:done?"default":"pointer", display:"flex", gap:14, alignItems:"flex-start", transition:"all 0.2s" }}>
                    <span style={{ fontFamily:F.h, fontSize:16, color:done&&correct?"#3a7a3a":(done&&sel?"#7a3a3a":C.muted), minWidth:20, lineHeight:1.6 }}>{String.fromCharCode(65+oi)}</span>
                    <span style={{ ...BD, fontSize:14, color, margin:0, lineHeight:1.7 }}>{opt}</span>
                    {done&&correct&&<span style={{ marginLeft:"auto", color:"#3a7a3a", fontSize:16, flexShrink:0 }}>✓</span>}
                  </div>
                );
              })}
              {!qDone[qi]&&qSel[qi]!==null&&(
                <button onClick={()=>{const n=[...qDone];n[qi]=true;setQDone(n);}}
                  style={{ marginTop:8, padding:"10px 28px", background:"transparent", border:`1px solid ${C.gold}`, color:C.gold, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer" }}>
                  확인
                </button>
              )}
              {qDone[qi]&&(
                <div style={{ background:"#101910", border:`1px solid #1e3a1e`, padding:"16px 20px", marginTop:12 }}>
                  <p style={{ fontSize:11, color:"#4a8a4a", letterSpacing:3, marginBottom:8 }}>해설</p>
                  <p style={{ ...BD, fontSize:13, color:"#90bb90", margin:0, lineHeight:1.85 }}>{q.exp}</p>
                </div>
              )}
            </div>
          ))}
          <div style={{ textAlign:"center", padding:"16px 0", borderTop:`1px solid ${C.line}` }}>
            <span style={{ ...MT, fontSize:12, letterSpacing:2 }}>{qDone.filter(Boolean).length} / {QUIZ.length} 완료</span>
          </div>
        </div>
      );

    case 7:
      return (
        <div style={W}>
          <StageBadge />
          <span style={SL}>논리 1/2 · 논증 구조</span>
          <h2 style={BT}>사르트르의 논증을 분해한다</h2>
          <div style={DIV} />
          <p style={{ ...MT, marginBottom:36, fontSize:14, lineHeight:1.9 }}>
            '다음 단계' 버튼을 눌러 사르트르의 논증을 단계적으로 따라가보세요.
          </p>
          {ARG_STEPS.slice(0, argStep+1).map((step,i)=>(
            <div key={i} style={{ marginBottom:14, opacity:i===argStep?1:0.55, transition:"opacity 0.3s" }}>
              <div style={{ display:"flex", alignItems:"stretch" }}>
                <div style={{ width:4, background:step.color, flexShrink:0 }} />
                <div style={{ background:i===argStep?C.surfUp:C.surf, padding:"20px 24px", flex:1 }}>
                  <div style={{ display:"flex", gap:12, alignItems:"center", marginBottom:10 }}>
                    <span style={{ fontFamily:F.b, fontSize:10, letterSpacing:4, color:step.color }}>{step.num}</span>
                    <span style={{ fontFamily:F.h, fontSize:18, color:i===argStep?C.txt:C.muted }}>{step.title}</span>
                  </div>
                  <p style={{ ...BD, fontSize:14, lineHeight:1.9, marginBottom:12, whiteSpace:"pre-line" }}>{step.body}</p>
                  <div style={{ padding:"10px 14px", background:C.bg, borderLeft:`2px solid ${step.color}44` }}>
                    <p style={{ ...MT, fontSize:12, margin:0, color:step.color }}>✦ {step.key}</p>
                  </div>
                </div>
              </div>
            </div>
          ))}
          <div style={{ display:"flex", gap:14, marginTop:24, alignItems:"center" }}>
            {argStep < ARG_STEPS.length-1 ? (
              <button onClick={()=>setArgStep(s=>s+1)}
                onMouseEnter={e=>{e.currentTarget.style.background=ARG_STEPS[argStep+1].color;e.currentTarget.style.color=C.bg;}}
                onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=ARG_STEPS[argStep+1].color;}}
                style={{ padding:"12px 28px", background:"transparent", border:`1px solid ${ARG_STEPS[argStep+1].color}`, color:ARG_STEPS[argStep+1].color, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", transition:"all 0.3s" }}>
                다음 단계 →
              </button>
            ) : (
              <span style={{ ...MT, fontSize:12, letterSpacing:2 }}>논증 완료</span>
            )}
            {argStep > 0 && (
              <button onClick={()=>setArgStep(0)} style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:2, cursor:"pointer" }}>
                처음부터
              </button>
            )}
            <span style={{ marginLeft:"auto", ...MT, fontSize:11 }}>{argStep+1} / {ARG_STEPS.length}</span>
          </div>
        </div>
      );

    case 8:
      return (
        <div style={W}>
          <StageBadge />
          <span style={SL}>논리 2/2 · 비판적 분석</span>
          <h2 style={BT}>사르트르가 넘어서려는 것</h2>
          <div style={DIV} />
          <p style={{ ...MT, marginBottom:24, fontSize:14 }}>각 입장을 눌러 비교해보세요.</p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:36 }}>
            {POSITIONS.map((pos,i)=>{
              const open = posOpen===i;
              return (
                <div key={i} onClick={()=>setPosOpen(open?null:i)}
                  style={{ background:open?C.surfUp:C.surf, border:`1px solid ${open?pos.color+"88":C.line}`, padding:"16px 14px", cursor:"pointer", transition:"all 0.25s" }}>
                  <p style={{ fontFamily:F.h, fontSize:17, color:open?pos.color:C.muted, margin:"0 0 4px", textAlign:"center" }}>{pos.label}</p>
                  <p style={{ fontSize:10, color:C.muted, fontStyle:"italic", margin:0, textAlign:"center", letterSpacing:1 }}>{pos.sub}</p>
                  {open && (
                    <div style={{ marginTop:14 }}>
                      <div style={{ marginBottom:10, paddingBottom:10, borderBottom:`1px solid ${C.line}` }}>
                        <p style={{ fontSize:10, color:pos.color, letterSpacing:3, marginBottom:6 }}>주장</p>
                        <p style={{ ...BD, fontSize:12, margin:0, lineHeight:1.75 }}>{pos.claim}</p>
                      </div>
                      <div style={{ marginBottom:pos.quote?10:0 }}>
                        <p style={{ fontSize:10, color:i===1?"#5a8a5a":"#8a4a4a", letterSpacing:3, marginBottom:6 }}>{i===1?"특징":"문제점"}</p>
                        <p style={{ ...BD, fontSize:12, margin:0, lineHeight:1.75, color:i===1?"#8abb8a":"#c48a8a" }}>{pos.problem}</p>
                      </div>
                      {pos.quote && (
                        <div style={{ marginTop:10, padding:"8px 12px", background:C.surf, borderLeft:`2px solid ${pos.color}44` }}>
                          <p style={{ fontSize:11, color:pos.color, margin:0, fontStyle:"italic" }}>"{pos.quote}"</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.logic.color, letterSpacing:4, marginBottom:16 }}>비판적 탐구 질문</p>
          {LOGIC_QS.map((item,i)=>{
            const open = logicOpen.has(i);
            return (
              <div key={i} style={{ marginBottom:12, background:C.surf, padding:"18px 22px" }}>
                <div style={{ display:"flex", gap:14, alignItems:"flex-start" }}>
                  <span style={{ fontFamily:F.h, fontSize:22, color:STAGES.logic.color, lineHeight:1, minWidth:28 }}>L{i+1}</span>
                  <p style={{ ...BD, fontWeight:400, lineHeight:1.75, margin:0, flex:1 }}>{item.q}</p>
                  <button onClick={()=>{const n=new Set(logicOpen);if(n.has(i))n.delete(i);else n.add(i);setLogicOpen(n);}}
                    style={{ background:"transparent", border:"none", color:C.muted, cursor:"pointer", padding:0, fontSize:16, flexShrink:0 }}>
                    {open?"↑":"↓"}
                  </button>
                </div>
                {open && (
                  <div style={{ paddingLeft:42, paddingTop:12 }}>
                    <p style={{ ...MT, fontSize:13, fontStyle:"italic", margin:0, lineHeight:1.8 }}>💡 {item.hint}</p>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );

    case 9:
      return (
        <div style={W}>
          <StageBadge />
          <span style={SL}>수사 · 세미나 준비</span>
          <h2 style={BT}>이제 함께 탐구합니다</h2>
          <div style={DIV} />
          <div style={{ background:"#1a0f0f", border:`1px solid ${STAGES.rhetoric.color}33`, padding:"20px 24px", marginBottom:36 }}>
            <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:10 }}>수사 단계에 대하여</p>
            <p style={{ ...BD, fontSize:14, margin:0, lineHeight:1.9 }}>
              문법으로 텍스트를 읽고, 논리로 논증을 분석했습니다. 수사는 그것을 <strong style={{color:C.txt}}>함께 말하는 단계</strong>입니다. 소크라테스식 세미나는 정답을 향해 가는 것이 아닙니다—질문이 질문을 낳고, 생각이 생각을 밀어올리는 과정입니다.
            </p>
          </div>
          <p style={{ fontFamily:F.b, fontSize:11, color:STAGES.rhetoric.color, letterSpacing:4, marginBottom:20 }}>세미나 토론 질문</p>
          {SEMINAR_QS.map((item,i)=>(
            <div key={i} style={{ marginBottom:20, background:C.surf, padding:"22px 26px", borderLeft:`3px solid ${STAGES.rhetoric.color}${i%2===0?"cc":"44"}` }}>
              <div style={{ display:"flex", gap:16, alignItems:"flex-start", marginBottom:12 }}>
                <span style={{ fontFamily:F.h, fontSize:28, color:STAGES.rhetoric.color, lineHeight:1, minWidth:34 }}>S{i+1}</span>
                <p style={{ ...BD, fontWeight:400, lineHeight:1.8, margin:0, flex:1 }}>{item.q}</p>
              </div>
              <div style={{ paddingLeft:50 }}>
                <button onClick={()=>{const n=new Set(seminHints);if(n.has(i))n.delete(i);else n.add(i);setSeminHints(n);}}
                  style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:3, cursor:"pointer", padding:0 }}>
                  {seminHints.has(i)?"힌트 접기 ↑":"힌트 보기 ↓"}
                </button>
                {seminHints.has(i) && (
                  <div style={{ marginTop:10, padding:"12px 16px", background:C.surfUp, borderLeft:`2px solid ${STAGES.rhetoric.color}33` }}>
                    <p style={{ ...MT, fontSize:13, fontStyle:"italic", margin:0, lineHeight:1.8 }}>💡 {item.hint}</p>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      );

    case 10:
      return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", padding:"48px 28px", background:C.bg, position:"relative" }}>
          <div style={{ position:"absolute", top:0, left:0, right:0, height:1, background:`linear-gradient(90deg, transparent, ${C.gold}44, transparent)` }} />
          <span style={{ fontFamily:F.b, fontSize:11, letterSpacing:6, color:C.muted, marginBottom:48, display:"block" }}>생각학교 ASK · 존재와 무 클래스</span>
          <div style={{ width:1, height:64, background:`linear-gradient(${C.gold}88, transparent)`, margin:"0 auto 44px" }} />
          <div style={{ background:C.surf, padding:"36px 40px", maxWidth:600, textAlign:"left", borderLeft:`3px solid ${C.gold}`, marginBottom:52 }}>
            <p style={{ fontSize:11, color:C.gold, letterSpacing:4, marginBottom:20 }}>오늘의 마지막 문장 · Jean-Paul Sartre</p>
            <p style={{ fontFamily:F.h, fontSize:"clamp(16px,2.5vw,20px)", fontStyle:"italic", color:C.txt, lineHeight:2.1, margin:0 }}>
              "우리는 대자를 그 존재에서 규정함으로써 즉자를 드러내 보이는 이 내적이고 실재화하는 이 부정을 초월
              <span style={{ fontFamily:F.b, fontSize:14, letterSpacing:1, fontStyle:"normal", color:C.muted }}> transcendance</span>
              이라고 명명할 것이다"
            </p>
            <p style={{ ...MT, fontSize:12, marginTop:20, marginBottom:0, letterSpacing:2 }}>— 『존재와 무』 2부 3장 1절</p>
          </div>
          <div style={{ display:"flex", gap:32, marginBottom:52, justifyContent:"center" }}>
            {[["문법","Grammar","#c4a35a"],["논리","Logic","#5a9abc"],["수사","Rhetoric","#bc7a7a"]].map(([l,e,col])=>(
              <div key={l} style={{ textAlign:"center" }}>
                <div style={{ width:5, height:5, borderRadius:"50%", background:col, margin:"0 auto 8px" }} />
                <p style={{ fontFamily:F.b, fontSize:11, color:col, letterSpacing:3, marginBottom:5 }}>{l}</p>
                <p style={{ fontFamily:F.h, fontSize:13, color:C.muted, margin:0, fontStyle:"italic" }}>{e}</p>
              </div>
            ))}
          </div>
          <button onClick={()=>go(0)} style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.muted, fontFamily:F.b, fontSize:11, letterSpacing:4, padding:"12px 32px", cursor:"pointer" }}>
            처음으로
          </button>
        </div>
      );

    default: return null;
    }
  };

  const navVisible = page > 0 && page < 10;
  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>
      {navVisible && (
        <div style={{ position:"fixed", top:0, left:0, right:0, height:2, background:C.line, zIndex:100 }}>
          <div style={{ height:"100%", width:`${((page-1)/8)*100}%`, background:stage?stage.color:C.gold, transition:"width 0.4s ease, background 0.4s ease" }} />
        </div>
      )}
      <div style={{ opacity:fading?0:1, transition:"opacity 0.28s ease", paddingTop:navVisible?2:0 }}>
        {renderPage()}
      </div>
      {navVisible && (
        <div style={{ maxWidth:720, margin:"0 auto", padding:"0 28px 52px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <button onClick={prev} style={{ background:"transparent", border:"none", color:C.muted, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>← 이전</button>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            {Array.from({length:9},(_,i)=>{
              const ps = PAGE_STAGE[i+2];
              const col = ps ? STAGES[ps].color : C.gold;
              const active = i===page-2;
              const done = i<page-2;
              return <div key={i} style={{ width:active?8:5, height:active?8:5, borderRadius:"50%", background:done||active?col:C.line, transition:"all 0.3s" }} />;
            })}
          </div>
          {page < 9 ? (
            <button onClick={next} style={{ background:"transparent", border:"none", color:stage?stage.color:C.gold, fontFamily:F.b, fontSize:12, letterSpacing:3, cursor:"pointer", padding:"12px 0" }}>다음 →</button>
          ) : (
            <button onClick={next}
              onMouseEnter={e=>{e.currentTarget.style.background=STAGES.rhetoric.color;e.currentTarget.style.color=C.bg;}}
              onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=STAGES.rhetoric.color;}}
              style={{ background:"transparent", border:`1px solid ${STAGES.rhetoric.color}`, color:STAGES.rhetoric.color, fontFamily:F.b, fontSize:11, letterSpacing:3, padding:"10px 24px", cursor:"pointer", transition:"all 0.3s" }}>
              마무리
            </button>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
